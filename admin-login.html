<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Admin Login | GlowBook</title>
  
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  
  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --primary-blue: #0066FF;
      --primary-light: #4D94FF;
      --primary-dark: #0044CC;
      --primary-gradient: linear-gradient(135deg, #0066FF, #0044CC);
      --secondary-blue: #E8F0FE;
      --bg-light: #F8FAFF;
      --white: #FFFFFF;
      --dark: #1A2332;
      --gray: #6B7A8F;
      --light-gray: #E8EDF2;
      --shadow-sm: 0 2px 10px rgba(0, 102, 255, 0.08);
      --shadow-md: 0 8px 30px rgba(0, 102, 255, 0.12);
      --shadow-lg: 0 20px 60px rgba(0, 102, 255, 0.15);
      --transition-smooth: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      --radius-sm: 12px;
      --radius-md: 20px;
      --radius-lg: 30px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-light);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
    }

    /* Subtle Background Pattern */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(circle at 20% 50%, rgba(0, 102, 255, 0.03) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(0, 102, 255, 0.02) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .login-container {
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
    }

    .login-box {
      background: var(--white);
      padding: 45px 40px 40px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--light-gray);
      box-shadow: var(--shadow-sm);
      transition: var(--transition-smooth);
    }

    .login-box:hover {
      box-shadow: var(--shadow-md);
      border-color: var(--primary-blue);
    }

    /* ============ GLOWBOOK LOGO ============ */
    .logo {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo-link {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      transition: var(--transition-smooth);
    }

    .logo-link:hover {
      transform: scale(1.02);
    }

    .logo-icon {
      position: relative;
      width: 48px;
      height: 48px;
      background: var(--primary-gradient);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 15px rgba(0, 102, 255, 0.3);
    }

    .logo-icon i {
      font-size: 24px;
      color: white;
      position: relative;
      z-index: 1;
    }

    .logo-icon .sparkle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: white;
      border-radius: 50%;
      top: 8px;
      right: 8px;
      animation: sparkle 1.5s infinite;
    }

    @keyframes sparkle {
      0%, 100% { opacity: 0; transform: scale(0.5); }
      50% { opacity: 1; transform: scale(1); }
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.1;
    }

    .logo-text .brand {
      font-size: 1.8rem;
      font-weight: 800;
      font-family: 'Playfair Display', serif;
      background: var(--primary-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    .logo-text .tagline {
      font-size: 0.6rem;
      letter-spacing: 2.5px;
      color: var(--gray);
      text-transform: uppercase;
      font-weight: 500;
    }

    /* Admin Badge */
    .admin-badge {
      display: inline-block;
      background: var(--secondary-blue);
      color: var(--primary-blue);
      font-size: 0.7rem;
      font-weight: 700;
      padding: 4px 14px;
      border-radius: 50px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 6px;
    }

    h2 {
      text-align: center;
      font-size: 1.4rem;
      color: var(--dark);
      margin-bottom: 28px;
      font-weight: 600;
      font-family: 'Playfair Display', serif;
    }

    /* ============ INPUT FIELDS ============ */
    .input-group {
      position: relative;
      margin-bottom: 18px;
    }

    .input-group input {
      width: 100%;
      padding: 14px 18px 14px 46px;
      background: var(--bg-light);
      border: 2px solid var(--light-gray);
      border-radius: var(--radius-sm);
      font-size: 0.95rem;
      color: var(--dark);
      transition: var(--transition-smooth);
      font-family: 'Inter', sans-serif;
    }

    .input-group input:focus {
      border-color: var(--primary-blue);
      outline: none;
      box-shadow: 0 0 0 4px rgba(0, 102, 255, 0.08);
      background: var(--white);
    }

    .input-group input::placeholder {
      color: var(--gray);
    }

    .input-group .input-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gray);
      font-size: 1rem;
      transition: var(--transition-smooth);
      pointer-events: none;
    }

    .input-group input:focus ~ .input-icon {
      color: var(--primary-blue);
    }

    /* ============ LOGIN BUTTON ============ */
    .btn-login {
      width: 100%;
      padding: 15px;
      background: var(--primary-gradient);
      color: white;
      border: none;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition-smooth);
      box-shadow: 0 4px 15px rgba(0, 102, 255, 0.3);
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.3px;
      margin-top: 6px;
      position: relative;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0, 102, 255, 0.4);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .btn-login:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .btn-login.loading::after {
      content: '';
      border: 3px solid rgba(255,255,255,0.3);
      border-top: 3px solid white;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      0% { transform: translateY(-50%) rotate(0deg); }
      100% { transform: translateY(-50%) rotate(360deg); }
    }

    /* ============ MESSAGE ============ */
    #message {
      text-align: center;
      margin-top: 16px;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      font-size: 0.9rem;
      font-weight: 500;
      display: none;
    }

    #message.show {
      display: block;
    }

    #message.success {
      background: #E8F5E9;
      color: #2E7D32;
      border: 1px solid #A5D6A7;
    }

    #message.error {
      background: #FFEBEE;
      color: #C62828;
      border: 1px solid #FFCDD2;
    }

    /* ============ BACK LINK ============ */
    .back-link {
      text-align: center;
      margin-top: 20px;
      font-size: 0.9rem;
      color: var(--gray);
    }

    .back-link a {
      color: var(--primary-blue);
      text-decoration: none;
      font-weight: 600;
      transition: var(--transition-smooth);
    }

    .back-link a:hover {
      color: var(--primary-dark);
      text-decoration: underline;
    }

    /* ============ RESPONSIVE ============ */
    @media (max-width: 576px) {
      .login-box {
        padding: 30px 24px 28px;
        border-radius: var(--radius-md);
      }
      
      .logo-text .brand {
        font-size: 1.4rem;
      }

      .logo-icon {
        width: 40px;
        height: 40px;
      }

      .logo-icon i {
        font-size: 18px;
      }

      h2 {
        font-size: 1.2rem;
        margin-bottom: 22px;
      }
      
      .input-group input {
        padding: 12px 16px 12px 40px;
        font-size: 0.9rem;
      }

      .btn-login {
        padding: 13px;
        font-size: 0.95rem;
      }
    }

    @media (max-width: 380px) {
      .login-box {
        padding: 20px 16px;
      }

      .logo-text .brand {
        font-size: 1.2rem;
      }

      .logo-text .tagline {
        font-size: 0.5rem;
        letter-spacing: 1.5px;
      }

      .btn-login {
        font-size: 0.9rem;
        padding: 12px;
      }
    }
  </style>
</head>
<body>

<div class="login-container">
  <div class="login-box">
    <!-- Logo - Clickable to Home -->
    <div class="logo">
      <a href="index.html" class="logo-link">
        <div class="logo-icon">
          <i class="fas fa-spa"></i>
          <div class="sparkle"></div>
        </div>
        <div class="logo-text">
          <span class="brand">GlowBook</span>
          <span class="tagline">BOOK YOUR GLOW</span>
        </div>
      </a>
      <div class="admin-badge">Admin Portal</div>
    </div>

    <h2>Admin Login</h2>

    <form id="loginForm" autocomplete="off">
      <div class="input-group">
        <input type="email" id="email" placeholder="admin@example.com" required />
        <i class="fas fa-envelope input-icon"></i>
      </div>
      <div class="input-group">
        <input type="password" id="password" placeholder="Enter password" required />
        <i class="fas fa-lock input-icon"></i>
      </div>
      <button type="submit" class="btn-login" id="loginButton">Login</button>
    </form>

    <div id="message"></div>

    <div class="back-link">
      Don't have an account? <a href="admin-register.html">Register here</a>
    </div>
  </div>
</div>

<script>
  const form = document.getElementById('loginForm');
  const messageDiv = document.getElementById('message');
  const loginButton = document.getElementById('loginButton');

  function showMessage(text, type) {
    messageDiv.textContent = text;
    messageDiv.className = type + ' show';
  }

  function hideMessage() {
    messageDiv.className = '';
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    hideMessage();
    
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();

    if (!email || !password) {
      showMessage('Please fill in all fields', 'error');
      return;
    }

    // Show loading state
    const originalText = loginButton.textContent;
    loginButton.textContent = 'Logging in...';
    loginButton.classList.add('loading');
    loginButton.disabled = true;

    try {
      // BACKEND API - COMPLETELY UNCHANGED
      const res = await fetch('https://salon-booking-backend-vsaz.onrender.com/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });

      const data = await res.json();
      
      // Restore button state
      loginButton.textContent = originalText;
      loginButton.classList.remove('loading');
      loginButton.disabled = false;

      if (res.ok) {
        localStorage.setItem('adminName', data.name);
        localStorage.setItem('adminEmail', data.email);
        showMessage(data.message || 'Login successful! Redirecting...', 'success');
        setTimeout(() => (window.location.href = 'admin-panel.html'), 1200);
      } else {
        showMessage(data.message || 'Login failed. Please try again.', 'error');
      }
    } catch (err) {
      console.error(err);
      loginButton.textContent = originalText;
      loginButton.classList.remove('loading');
      loginButton.disabled = false;
      showMessage('Network error. Please try again.', 'error');
    }
  });
</script>
</body>
</html>
