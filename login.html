<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Login | GlowBook</title>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  
  <!-- Google Fonts - Luxury -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg-dark: #0a0a0a;
      --bg-card: #111111;
      --bg-elevated: #1a1a1a;
      --gold-primary: #D4AF37;
      --gold-light: #F3E5AB;
      --gold-dark: #B8960C;
      --white-soft: #fafafa;
      --gray-muted: #888888;
      --border-glow: rgba(212, 175, 55, 0.2);
      --transition-smooth: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0a0a0a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* Animated Background Effect */
    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at 20% 50%, rgba(212,175,55,0.08) 0%, transparent 50%);
      pointer-events: none;
    }

    body::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="rgba(212,175,55,0.02)" d="M0,96L48,112C96,128,192,160,288,160C384,160,480,128,576,122.7C672,117,768,139,864,154.7C960,171,1056,181,1152,165.3C1248,149,1344,107,1392,85.3L1440,64L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>') repeat-x bottom;
      background-size: cover;
      opacity: 0.3;
      pointer-events: none;
    }

    .login-container {
      width: 100%;
      max-width: 460px;
      position: relative;
      z-index: 1;
    }

    .login-box {
      background: rgba(17, 17, 17, 0.95);
      backdrop-filter: blur(20px);
      padding: 45px 40px;
      border-radius: 32px;
      border: 1px solid rgba(212, 175, 55, 0.2);
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(212, 175, 55, 0.1);
      transition: var(--transition-smooth);
    }

    .login-box:hover {
      border-color: rgba(212, 175, 55, 0.4);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(212, 175, 55, 0.2);
    }

    /* Logo Section - YOUR ORIGINAL BRAND NAME */
    .logo {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo-content {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: linear-gradient(135deg, var(--gold-light), var(--gold-primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-size: 28px;
      font-weight: 800;
      font-family: 'Playfair Display', serif;
      letter-spacing: -0.5px;
    }

    .logo-content i {
      font-size: 32px;
      color: var(--gold-primary);
      -webkit-text-fill-color: var(--gold-primary);
      filter: drop-shadow(0 0 10px rgba(212,175,55,0.3));
    }

    h2 {
      text-align: center;
      font-size: 28px;
      color: var(--white-soft);
      margin-bottom: 30px;
      font-weight: 600;
      font-family: 'Playfair Display', serif;
      letter-spacing: -0.3px;
    }

    /* Input Fields */
    .input-group {
      position: relative;
      margin-bottom: 24px;
    }

    .input-group input {
      width: 100%;
      padding: 16px 50px 16px 20px;
      background: var(--bg-elevated);
      border: 1.5px solid rgba(212, 175, 55, 0.15);
      border-radius: 16px;
      font-size: 15px;
      color: var(--white-soft);
      transition: var(--transition-smooth);
      font-weight: 500;
    }

    .input-group input:focus {
      border-color: var(--gold-primary);
      outline: none;
      box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.1);
      background: var(--bg-card);
    }

    .input-group input::placeholder {
      color: var(--gray-muted);
      font-weight: 400;
    }

    .input-group i:not(.password-toggle) {
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gray-muted);
      font-size: 18px;
      transition: var(--transition-smooth);
      pointer-events: none;
    }

    .input-group input:focus + i {
      color: var(--gold-primary);
    }

    .password-toggle {
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: var(--gray-muted);
      font-size: 18px;
      transition: var(--transition-smooth);
      z-index: 2;
    }

    .password-toggle:hover {
      color: var(--gold-primary);
    }

    /* Remember & Forgot */
    .remember-forgot {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
      font-size: 14px;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--gray-muted);
      cursor: pointer;
    }

    .remember input {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: var(--gold-primary);
    }

    .remember span {
      cursor: pointer;
    }

    .forgot-password {
      color: var(--gold-primary);
      text-decoration: none;
      transition: var(--transition-smooth);
      font-weight: 500;
    }

    .forgot-password:hover {
      color: var(--gold-light);
      text-decoration: underline;
    }

    /* Login Button */
    button[type="submit"] {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--gold-primary), var(--gold-dark));
      color: #0a0a0a;
      border: none;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition-smooth);
      box-shadow: 0 5px 20px rgba(212, 175, 55, 0.3);
    }

    button[type="submit"]:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(212, 175, 55, 0.5);
    }

    button[type="submit"]:active {
      transform: translateY(0);
    }

    button[type="submit"]:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    /* Message */
    #msg {
      margin-top: 20px;
      text-align: center;
      padding: 12px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
    }

    .success {
      background: rgba(212, 175, 55, 0.1);
      color: var(--gold-primary);
      border: 1px solid rgba(212, 175, 55, 0.3);
    }

    .error {
      background: rgba(220, 53, 69, 0.1);
      color: #dc3545;
      border: 1px solid rgba(220, 53, 69, 0.3);
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      margin: 28px 0;
      color: var(--gray-muted);
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-primary), transparent);
    }

    .divider span {
      padding: 0 15px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Social Login */
    .social-login {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 25px;
    }

    .social-btn {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: var(--transition-smooth);
      border: 1.5px solid rgba(212, 175, 55, 0.2);
      background: var(--bg-elevated);
      font-size: 20px;
    }

    .social-btn.google {
      color: #db4437;
    }

    .social-btn.facebook {
      color: #4267B2;
    }

    .social-btn:hover {
      transform: translateY(-3px);
      border-color: var(--gold-primary);
      background: rgba(212, 175, 55, 0.1);
    }

    /* Back Link */
    .back-link {
      text-align: center;
      margin-top: 25px;
      font-size: 14px;
      color: var(--gray-muted);
    }

    .back-link a {
      color: var(--gold-primary);
      text-decoration: none;
      font-weight: 600;
      transition: var(--transition-smooth);
    }

    .back-link a:hover {
      color: var(--gold-light);
      text-decoration: underline;
    }

    /* Custom Checkbox Style */
    .remember input {
      appearance: none;
      width: 18px;
      height: 18px;
      border: 2px solid var(--gold-primary);
      border-radius: 4px;
      background: transparent;
      cursor: pointer;
      position: relative;
      transition: var(--transition-smooth);
    }

    .remember input:checked {
      background: var(--gold-primary);
    }

    .remember input:checked::after {
      content: '\f00c';
      font-family: 'Font Awesome 6 Free';
      font-weight: 900;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #0a0a0a;
      font-size: 10px;
    }

    /* Responsive */
    @media (max-width: 576px) {
      .login-box {
        padding: 35px 25px;
      }
      
      .logo-content {
        font-size: 24px;
      }
      
      .logo-content i {
        font-size: 28px;
      }
      
      h2 {
        font-size: 24px;
        margin-bottom: 25px;
      }
      
      .input-group input {
        padding: 14px 50px 14px 18px;
      }
    }

    /* Animation */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .login-box {
      animation: fadeInUp 0.6s ease-out;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-box">
      <div class="logo">
        <div class="logo-content">
          <i class="fas fa-spa"></i> GlowBook
        </div>
      </div>

      <h2>Welcome Back</h2>

      <form id="loginForm">
        <div class="input-group">
          <input type="email" id="email" placeholder="Email Address" required />
          <i class="fas fa-envelope"></i>
        </div>
        <div class="input-group">
          <input type="password" id="password" placeholder="Password" required />
          <i class="fas fa-lock"></i>
          <i class="fas fa-eye password-toggle" id="passwordToggle"></i>
        </div>
        
        <div class="remember-forgot">
          <label class="remember">
            <input type="checkbox" id="remember">
            <span>Remember me</span>
          </label>
          <a href="#" class="forgot-password">Forgot Password?</a>
        </div>
        
        <button type="submit" id="loginButton">Login</button>
      </form>

      <div class="divider"><span>Or continue with</span></div>
      
      <div class="social-login">
        <div class="social-btn google">
          <i class="fab fa-google"></i>
        </div>
        <div class="social-btn facebook">
          <i class="fab fa-facebook-f"></i>
        </div>
      </div>

      <p id="msg"></p>

      <div class="back-link">
        Don't have an account? <a href="register.html">Register here</a>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const loginForm = document.getElementById('loginForm');
      const passwordToggle = document.getElementById('passwordToggle');
      const passwordInput = document.getElementById('password');
      const loginButton = document.getElementById('loginButton');
      const msgEl = document.getElementById('msg');
      
      // Check if there's a remembered email
      const rememberedEmail = localStorage.getItem('rememberedEmail');
      if (rememberedEmail) {
        document.getElementById('email').value = rememberedEmail;
        document.getElementById('remember').checked = true;
      }
      
      // Password visibility toggle
      passwordToggle.addEventListener('click', function() {
        if (passwordInput.type === 'password') {
          passwordInput.type = 'text';
          passwordToggle.classList.remove('fa-eye');
          passwordToggle.classList.add('fa-eye-slash');
        } else {
          passwordInput.type = 'password';
          passwordToggle.classList.remove('fa-eye-slash');
          passwordToggle.classList.add('fa-eye');
        }
      });
      
      // Form submission - BACKEND API PRESERVED
      loginForm.addEventListener('submit', async function(e) {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const rememberMe = document.getElementById('remember').checked;
        
        // Show loading state
        const originalText = loginButton.textContent;
        loginButton.textContent = 'Logging in...';
        loginButton.disabled = true;
        
        try {
          // BACKEND API - COMPLETELY UNCHANGED
          const res = await fetch('https://salon-booking-backend-vsaz.onrender.com/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
          });

          const data = await res.json();
          
          // Restore button state
          loginButton.textContent = originalText;
          loginButton.disabled = false;
          
          msgEl.textContent = data.message;
          msgEl.className = data.success ? 'success' : 'error';
          
          if (data.success) {
            // Store email if remember me is checked
            if (rememberMe) {
              localStorage.setItem('rememberedEmail', email);
            } else {
              localStorage.removeItem('rememberedEmail');
            }
            
            // STORAGE LOGIC - COMPLETELY UNCHANGED
            localStorage.setItem('user', JSON.stringify({ 
              name: data.name, 
              email: data.email 
            }));
            
            setTimeout(() => {
              window.location.href = 'index.html';
            }, 1000);
          }
        } catch (error) {
          // Restore button state
          loginButton.textContent = originalText;
          loginButton.disabled = false;
          
          msgEl.textContent = 'Network error. Please try again.';
          msgEl.className = 'error';
          console.error('Login error:', error);
        }
      });
      
      // Social login buttons (placeholder - COMPLETELY UNCHANGED)
      document.querySelectorAll('.social-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          msgEl.textContent = 'Social login would be implemented here';
          msgEl.className = 'success';
        });
      });
      
      // Forgot password (placeholder - COMPLETELY UNCHANGED)
      document.querySelector('.forgot-password').addEventListener('click', function(e) {
        e.preventDefault();
        msgEl.textContent = 'Password reset feature would be implemented here';
        msgEl.className = 'success';
      });
    });
  </script>
</body>
</html>
