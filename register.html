<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Register | GlowBook - Premium Beauty Booking</title>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --primary-blue: #0066FF;
      --primary-light: #4D94FF;
      --primary-dark: #0044CC;
      --primary-gradient: linear-gradient(135deg, #0066FF, #0044CC);
      --secondary-blue: #E8F0FE;
      --bg-light: #F8FAFF;
      --white: #FFFFFF;
      --dark: #1A2332;
      --gray: #6B7A8F;
      --light-gray: #E8EDF2;
      --shadow-sm: 0 2px 10px rgba(0, 102, 255, 0.08);
      --shadow-md: 0 8px 30px rgba(0, 102, 255, 0.12);
      --shadow-lg: 0 20px 60px rgba(0, 102, 255, 0.15);
      --transition-smooth: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      --radius-sm: 12px;
      --radius-md: 20px;
      --radius-lg: 30px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-light);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
    }

    /* Subtle Background Pattern */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(circle at 20% 50%, rgba(0, 102, 255, 0.03) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(0, 102, 255, 0.02) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .register-container {
      width: 100%;
      max-width: 440px;
      position: relative;
      z-index: 1;
    }

    .register-box {
      background: var(--white);
      padding: 45px 40px 40px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--light-gray);
      box-shadow: var(--shadow-sm);
      transition: var(--transition-smooth);
      max-height: 95vh;
      overflow-y: auto;
    }

    .register-box:hover {
      box-shadow: var(--shadow-md);
      border-color: var(--primary-blue);
    }

    /* Custom Scrollbar */
    .register-box::-webkit-scrollbar {
      width: 4px;
    }
    .register-box::-webkit-scrollbar-track {
      background: var(--bg-light);
      border-radius: 4px;
    }
    .register-box::-webkit-scrollbar-thumb {
      background: var(--primary-blue);
      border-radius: 4px;
    }

    /* ============ GLOWBOOK LOGO ============ */
    .logo {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo-link {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      transition: var(--transition-smooth);
    }

    .logo-link:hover {
      transform: scale(1.02);
    }

    .logo-icon {
      position: relative;
      width: 48px;
      height: 48px;
      background: var(--primary-gradient);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 15px rgba(0, 102, 255, 0.3);
    }

    .logo-icon i {
      font-size: 24px;
      color: white;
      position: relative;
      z-index: 1;
    }

    .logo-icon .sparkle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: white;
      border-radius: 50%;
      top: 8px;
      right: 8px;
      animation: sparkle 1.5s infinite;
    }

    @keyframes sparkle {
      0%, 100% { opacity: 0; transform: scale(0.5); }
      50% { opacity: 1; transform: scale(1); }
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.1;
    }

    .logo-text .brand {
      font-size: 1.8rem;
      font-weight: 800;
      font-family: 'Playfair Display', serif;
      background: var(--primary-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    .logo-text .tagline {
      font-size: 0.6rem;
      letter-spacing: 2.5px;
      color: var(--gray);
      text-transform: uppercase;
      font-weight: 500;
    }

    h2 {
      text-align: center;
      font-size: 1.5rem;
      color: var(--dark);
      margin-bottom: 28px;
      font-weight: 600;
      font-family: 'Playfair Display', serif;
    }

    /* ============ INPUT FIELDS ============ */
    .input-group {
      position: relative;
      margin-bottom: 18px;
    }

    .input-group input,
    .input-group select {
      width: 100%;
      padding: 14px 18px;
      background: var(--bg-light);
      border: 2px solid var(--light-gray);
      border-radius: var(--radius-sm);
      font-size: 0.95rem;
      color: var(--dark);
      transition: var(--transition-smooth);
      font-family: 'Inter', sans-serif;
    }

    .input-group select {
      cursor: pointer;
      appearance: none;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="%236B7A8F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>');
      background-repeat: no-repeat;
      background-position: right 16px center;
      padding-right: 40px;
    }

    .input-group input:focus,
    .input-group select:focus {
      border-color: var(--primary-blue);
      outline: none;
      box-shadow: 0 0 0 4px rgba(0, 102, 255, 0.08);
      background: var(--white);
    }

    .input-group input::placeholder {
      color: var(--gray);
    }

    .input-group .input-icon {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gray);
      font-size: 1rem;
      transition: var(--transition-smooth);
      pointer-events: none;
    }

    .input-group input:focus ~ .input-icon {
      color: var(--primary-blue);
    }

    /* Password Toggle */
    #togglePassword {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: var(--gray);
      font-size: 1rem;
      transition: var(--transition-smooth);
      z-index: 2;
      background: none;
      border: none;
      padding: 0;
    }

    #togglePassword:hover {
      color: var(--primary-blue);
    }

    /* Password Error */
    #passwordError {
      color: #C62828;
      font-size: 0.8rem;
      margin-top: 5px;
      display: none;
      text-align: left;
    }

    /* OTP Box */
    #otpBox {
      display: none;
    }

    /* ============ REGISTER BUTTON ============ */
    .btn-register {
      width: 100%;
      padding: 15px;
      background: var(--primary-gradient);
      color: white;
      border: none;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition-smooth);
      box-shadow: 0 4px 15px rgba(0, 102, 255, 0.3);
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.3px;
      margin-top: 6px;
    }

    .btn-register:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0, 102, 255, 0.4);
    }

    .btn-register:active {
      transform: translateY(0);
    }

    .btn-register:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    /* ============ BACK LINK ============ */
    .back-link {
      text-align: center;
      margin-top: 20px;
      font-size: 0.9rem;
      color: var(--gray);
    }

    .back-link a {
      color: var(--primary-blue);
      text-decoration: none;
      font-weight: 600;
      transition: var(--transition-smooth);
    }

    .back-link a:hover {
      color: var(--primary-dark);
      text-decoration: underline;
    }

    /* ============ TOAST ============ */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--dark);
      color: white;
      padding: 12px 25px;
      border-radius: 50px;
      box-shadow: var(--shadow-lg);
      opacity: 0;
      pointer-events: none;
      transition: all 0.4s ease;
      z-index: 999;
      font-weight: 500;
      font-size: 0.95rem;
    }

    .toast.show {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(-50%) translateY(0);
    }

    .toast.success {
      background: #2E7D32;
    }

    .toast.error {
      background: #C62828;
    }

    /* ============ RESPONSIVE ============ */
    @media (max-width: 576px) {
      .register-box {
        padding: 30px 24px 28px;
        border-radius: var(--radius-md);
      }
      
      .logo-text .brand {
        font-size: 1.4rem;
      }

      .logo-icon {
        width: 40px;
        height: 40px;
      }

      .logo-icon i {
        font-size: 18px;
      }

      h2 {
        font-size: 1.3rem;
        margin-bottom: 22px;
      }
      
      .input-group input,
      .input-group select {
        padding: 12px 16px;
        font-size: 0.9rem;
      }

      .btn-register {
        padding: 13px;
        font-size: 0.95rem;
      }
    }

    @media (max-width: 380px) {
      .register-box {
        padding: 20px 16px;
      }

      .logo-text .brand {
        font-size: 1.2rem;
      }

      .logo-text .tagline {
        font-size: 0.5rem;
        letter-spacing: 1.5px;
      }

      .btn-register {
        font-size: 0.9rem;
        padding: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="register-container">
    <div class="register-box">
      <!-- Logo - Clickable to Home -->
      <div class="logo">
        <a href="index.html" class="logo-link">
          <div class="logo-icon">
            <i class="fas fa-spa"></i>
            <div class="sparkle"></div>
          </div>
          <div class="logo-text">
            <span class="brand">GlowBook</span>
            <span class="tagline">BOOK YOUR GLOW</span>
          </div>
        </a>
      </div>

      <h2>Create Account</h2>

      <form id="registerForm" autocomplete="off">
        <div class="input-group">
          <input type="text" id="name" placeholder="Full Name" required />
        </div>
        <div class="input-group">
          <input type="email" id="email" placeholder="Email Address" required />
          <i class="fas fa-envelope input-icon"></i>
        </div>
        <div class="input-group">
          <input type="password" id="password" placeholder="Password" required />
          <i class="fas fa-lock input-icon"></i>
          <button type="button" id="togglePassword" aria-label="Toggle password visibility">
            <i class="fas fa-eye"></i>
          </button>
          <small id="passwordError"></small>
        </div>
        <div class="input-group">
          <input type="text" id="phone" placeholder="Phone Number" maxlength="10" required />
          <i class="fas fa-phone input-icon"></i>
        </div>
        <div class="input-group">
          <select id="gender" required>
            <option value="">Select Gender</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
          </select>
        </div>
        <div class="input-group" id="otpBox">
          <input type="text" id="otp" placeholder="Enter OTP" />
          <i class="fas fa-key input-icon"></i>
        </div>

        <button type="submit" class="btn-register" id="registerButton">Register</button>
        <div class="back-link">
          Already have an account? <a href="login.html">Login here</a>
        </div>
      </form>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const form = document.getElementById('registerForm');
    const otpBox = document.getElementById('otpBox');
    const toast = document.getElementById('toast');
    const registerButton = document.getElementById('registerButton');
    let userData = {};

    const showToast = (message, isSuccess = true) => {
      toast.textContent = message;
      toast.className = `toast show ${isSuccess ? 'success' : 'error'}`;
      setTimeout(() => {
        toast.className = 'toast';
      }, 3000);
    };

    const validateForm = (name, email, password, phone, gender) => {
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      const phoneRegex = /^[0-9]{10}$/;
      const passwordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{6,}$/;

      if (name.length < 3) {
        showToast('Name must be at least 3 characters.', false);
        return false;
      }

      if (!emailRegex.test(email)) {
        showToast('Invalid email format.', false);
        return false;
      }

      const passwordError = document.getElementById('passwordError');
      if (!passwordRegex.test(password)) {
        passwordError.textContent = 'Password must include uppercase, lowercase, number & special character.';
        passwordError.style.display = 'block';
        document.getElementById('password').style.borderColor = '#C62828';
        return false;
      } else {
        passwordError.style.display = 'none';
      }

      if (!phoneRegex.test(phone)) {
        showToast('Phone must be 10 digits.', false);
        return false;
      }

      if (!gender) {
        showToast('Please select a gender.', false);
        return false;
      }

      return true;
    };

    // Form submission - BACKEND API PRESERVED
   form.addEventListener('submit', async (e) => {
  e.preventDefault();

  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const gender = document.getElementById('gender').value;

  if (!validateForm(name, email, password, phone, gender)) return;

  const originalText = registerButton.textContent;
  registerButton.textContent = 'Registering...';
  registerButton.disabled = true;

  try {
    const res = await fetch('https://salon-booking-backend-vsaz.onrender.com/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, password, phone, gender })
    });

    const data = await res.json();

    registerButton.textContent = originalText;
    registerButton.disabled = false;

    showToast(data.message, data.success);

    if (data.success) {
      setTimeout(() => {
        window.location.href = 'login.html';
      }, 1500);
    }

  } catch (err) {
    registerButton.textContent = originalText;
    registerButton.disabled = false;
    showToast('Network error', false);
  }
});
      // Initial Registration - BACKEND API PRESERVED
      if (!validateForm(name, email, password, phone, gender)) return;

      userData = { name, email, password, phone, gender };

      const originalText = registerButton.textContent;
      registerButton.textContent = 'Registering...';
      registerButton.disabled = true;

      try {
        // BACKEND API - PRESERVED
        const res = await fetch('https://salon-booking-backend-vsaz.onrender.com/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(userData)
        });
        const data = await res.json();
        
        registerButton.textContent = originalText;
        registerButton.disabled = false;
        
        showToast(data.message, data.success);

        if (data.success) {
          otpBox.style.display = 'block';
          otpBox.style.animation = 'fadeInUp 0.4s ease-out';
        }
      } catch {
        registerButton.textContent = originalText;
        registerButton.disabled = false;
        showToast('Network error', false);
      }
    });

    // Real-time validation
    const nameInput = document.getElementById('name');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const phoneInput = document.getElementById('phone');
    const genderSelect = document.getElementById('gender');
    const togglePassword = document.getElementById('togglePassword');

    nameInput.addEventListener('input', () => {
      const isValid = nameInput.value.length >= 3;
      nameInput.style.borderColor = isValid ? '#2E7D32' : '#C62828';
    });

    emailInput.addEventListener('input', () => {
      const isValid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailInput.value);
      emailInput.style.borderColor = isValid ? '#2E7D32' : '#C62828';
    });

    passwordInput.addEventListener('input', () => {
      const isValid = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])/.test(passwordInput.value);
      passwordInput.style.borderColor = isValid ? '#2E7D32' : '#C62828';
      const errorEl = document.getElementById('passwordError');
      if (!isValid) {
        errorEl.textContent = 'Must contain uppercase, lowercase, number & special character';
        errorEl.style.display = 'block';
      } else {
        errorEl.style.display = 'none';
      }
    });

    phoneInput.addEventListener('input', () => {
      phoneInput.value = phoneInput.value.replace(/\D/g, '').slice(0, 10);
      const isValid = phoneInput.value.length === 10;
      phoneInput.style.borderColor = isValid ? '#2E7D32' : '#C62828';
    });

    genderSelect.addEventListener('change', () => {
      const isValid = genderSelect.value !== '';
      genderSelect.style.borderColor = isValid ? '#2E7D32' : '#C62828';
    });

    // Password visibility toggle
    togglePassword.addEventListener('click', () => {
      const input = passwordInput;
      const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
      input.setAttribute('type', type);
      const icon = togglePassword.querySelector('i');
      icon.classList.toggle('fa-eye');
      icon.classList.toggle('fa-eye-slash');
    });
  </script>
</body>
</html>
