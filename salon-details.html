<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Salon Details | GlowBook - Premium Beauty Booking</title>
  
  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  
  <!-- AOS Animation -->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --primary-blue: #0066FF;
      --primary-light: #4D94FF;
      --primary-dark: #0044CC;
      --primary-gradient: linear-gradient(135deg, #0066FF, #0044CC);
      --secondary-blue: #E8F0FE;
      --bg-light: #F8FAFF;
      --white: #FFFFFF;
      --dark: #1A2332;
      --gray: #6B7A8F;
      --light-gray: #E8EDF2;
      --shadow-sm: 0 2px 10px rgba(0, 102, 255, 0.08);
      --shadow-md: 0 8px 30px rgba(0, 102, 255, 0.12);
      --shadow-lg: 0 20px 60px rgba(0, 102, 255, 0.15);
      --transition-smooth: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      --radius-sm: 12px;
      --radius-md: 20px;
      --radius-lg: 30px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-light);
      color: var(--dark);
      line-height: 1.6;
      min-height: 100vh;
      position: relative;
    }

    /* Subtle Background Pattern */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at 20% 50%, rgba(0, 102, 255, 0.03) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
      padding: 0 20px;
    }

    /* ============ PREMIUM NAVBAR ============ */
    .premium-nav {
      background: var(--white);
      border-bottom: 1px solid var(--light-gray);
      padding: 14px 0;
      box-shadow: var(--shadow-sm);
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .premium-nav .nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* GlowBook Logo - Like Image */
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .nav-logo-icon {
      width: 38px;
      height: 38px;
      background: var(--primary-gradient);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(0, 102, 255, 0.25);
    }

    .nav-logo-icon i {
      font-size: 18px;
      color: white;
    }

    .nav-logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.1;
    }

    .nav-logo-text .brand {
      font-size: 1.4rem;
      font-weight: 800;
      font-family: 'Playfair Display', serif;
      background: var(--primary-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.3px;
    }

    .nav-logo-text .tagline {
      font-size: 0.55rem;
      letter-spacing: 2.5px;
      color: var(--gray);
      text-transform: uppercase;
      font-weight: 500;
    }

    /* Back Button - Better */
    .back-button {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--secondary-blue);
      padding: 8px 18px;
      border-radius: 50px;
      color: var(--primary-blue);
      text-decoration: none;
      font-weight: 500;
      font-size: 0.9rem;
      transition: var(--transition-smooth);
      border: 1px solid transparent;
    }

    .back-button:hover {
      background: var(--primary-blue);
      color: white;
      transform: translateX(-4px);
      box-shadow: 0 4px 15px rgba(0, 102, 255, 0.3);
    }

    .back-button i {
      font-size: 0.9rem;
    }

    .nav-actions {
      display: flex;
      gap: 10px;
    }

    .nav-actions button {
      background: var(--secondary-blue);
      border: none;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      color: var(--gray);
      cursor: pointer;
      transition: var(--transition-smooth);
      font-size: 0.9rem;
    }

    .nav-actions button:hover {
      background: var(--primary-blue);
      color: white;
      transform: translateY(-2px);
    }

    /* ============ MAIN LAYOUT ============ */
    .salon-details-wrapper {
      display: grid;
      grid-template-columns: 1fr 1.2fr;
      gap: 30px;
      padding: 30px 0 50px;
      animation: fadeInUp 0.6s ease-out;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ============ GALLERY SECTION ============ */
    .gallery-section {
      background: var(--white);
      border-radius: var(--radius-lg);
      border: 1px solid var(--light-gray);
      overflow: hidden;
      padding: 20px;
      position: sticky;
      top: 100px;
      box-shadow: var(--shadow-sm);
      transition: var(--transition-smooth);
    }

    .gallery-section:hover {
      box-shadow: var(--shadow-md);
    }

    .main-image {
      position: relative;
      border-radius: var(--radius-md);
      overflow: hidden;
      cursor: pointer;
      margin-bottom: 15px;
      background: var(--bg-light);
    }

    .main-image img {
      width: 100%;
      height: 380px;
      object-fit: cover;
      transition: transform 0.5s ease;
    }

    .main-image:hover img {
      transform: scale(1.03);
    }

    .image-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.5), transparent);
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      color: white;
      font-size: 0.8rem;
      opacity: 0;
      transition: var(--transition-smooth);
    }

    .main-image:hover .image-overlay {
      opacity: 1;
    }

    .thumbnail-scroll {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 8px 0;
      scrollbar-width: thin;
    }

    .thumbnail-scroll::-webkit-scrollbar {
      height: 4px;
    }

    .thumbnail-scroll::-webkit-scrollbar-thumb {
      background: var(--primary-blue);
      border-radius: 2px;
    }

    .thumbnail-scroll img {
      width: 75px;
      height: 75px;
      border-radius: var(--radius-sm);
      object-fit: cover;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.3s;
      flex-shrink: 0;
      background: var(--bg-light);
    }

    .thumbnail-scroll img.active,
    .thumbnail-scroll img:hover {
      border-color: var(--primary-blue);
      transform: translateY(-3px);
      box-shadow: var(--shadow-sm);
    }

    .image-nav-dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 12px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--light-gray);
      cursor: pointer;
      transition: all 0.3s;
    }

    .dot.active {
      background: var(--primary-blue);
      width: 24px;
      border-radius: 4px;
    }

    /* ============ INFO SECTION ============ */
    .info-section {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* Salon Header */
    .salon-header {
      background: var(--white);
      border-radius: var(--radius-md);
      padding: 24px 28px;
      border: 1px solid var(--light-gray);
      box-shadow: var(--shadow-sm);
    }

    .salon-header h1 {
      font-size: 2rem;
      font-family: 'Playfair Display', serif;
      color: var(--dark);
      margin-bottom: 8px;
    }

    .rating-badge {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .stars {
      color: #F59E0B;
      font-size: 0.95rem;
    }

    .review-count {
      color: var(--gray);
      font-size: 0.85rem;
    }

    .offer-banner {
      background: var(--secondary-blue);
      border: 1px solid rgba(0, 102, 255, 0.15);
      border-radius: var(--radius-sm);
      padding: 12px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .offer-banner i {
      font-size: 1.3rem;
      color: var(--primary-blue);
    }

    .offer-banner .offer-text {
      flex: 1;
      font-size: 0.9rem;
      color: var(--dark);
    }

    .offer-banner .offer-text strong {
      color: var(--primary-blue);
    }

    .offer-code {
      background: var(--primary-gradient);
      color: white;
      padding: 5px 14px;
      border-radius: 50px;
      font-weight: 600;
      font-family: monospace;
      letter-spacing: 1px;
      font-size: 0.8rem;
    }

    /* Info Cards Grid */
    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .info-card {
      background: var(--white);
      border-radius: var(--radius-md);
      padding: 18px 20px;
      border: 1px solid var(--light-gray);
      transition: var(--transition-smooth);
      box-shadow: var(--shadow-sm);
    }

    .info-card:hover {
      border-color: var(--primary-blue);
      transform: translateY(-3px);
      box-shadow: var(--shadow-md);
    }

    .info-card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--light-gray);
    }

    .info-card-header i {
      font-size: 1rem;
      color: var(--primary-blue);
    }

    .info-card-header h3 {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--gray);
    }

    .info-content p {
      margin: 5px 0;
      font-size: 0.9rem;
      color: var(--gray);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .info-content p i {
      width: 16px;
      color: var(--gray);
      font-size: 0.75rem;
    }

    .info-content p span,
    .info-content p a {
      color: var(--dark);
    }

    .info-content p a {
      color: var(--primary-blue);
      text-decoration: none;
      font-weight: 500;
    }

    .info-content p a:hover {
      text-decoration: underline;
    }

    /* Services List */
    .services-list {
      list-style: none;
    }

    .service-item {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--light-gray);
      font-size: 0.9rem;
    }

    .service-item:last-child {
      border-bottom: none;
    }

    .service-name {
      font-weight: 500;
      color: var(--dark);
    }

    .service-price {
      color: var(--primary-blue);
      font-weight: 600;
    }

    /* Amenities */
    .amenities-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 6px;
    }

    .amenity-tag {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      color: var(--gray);
      padding: 4px 0;
    }

    .amenity-tag i {
      color: var(--primary-blue);
      font-size: 0.7rem;
    }

    /* Staff Grid */
    .staff-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 12px;
    }

    .staff-card {
      background: var(--bg-light);
      border: 2px solid var(--light-gray);
      border-radius: var(--radius-sm);
      padding: 12px 8px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
    }

    .staff-card:hover {
      border-color: var(--primary-blue);
      transform: translateY(-3px);
    }

    .staff-card.selected {
      border-color: var(--primary-blue);
      background: var(--secondary-blue);
    }

    .staff-avatar {
      font-size: 2.2rem;
      color: var(--gray);
      margin-bottom: 4px;
    }

    .staff-name {
      font-weight: 500;
      font-size: 0.78rem;
      color: var(--dark);
    }

    .staff-card input {
      display: none;
    }

    /* Book Button */
    .btn-book {
      display: block;
      width: 100%;
      background: var(--primary-gradient);
      color: white;
      padding: 16px;
      border: none;
      border-radius: 50px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      text-align: center;
      font-family: 'Inter', sans-serif;
      box-shadow: 0 4px 15px rgba(0, 102, 255, 0.3);
      letter-spacing: 0.3px;
    }

    .btn-book:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(0, 102, 255, 0.4);
    }

    .btn-book:active {
      transform: translateY(0);
    }

    .btn-book i {
      margin-right: 10px;
    }

    /* ============ MODAL ============ */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.92);
      z-index: 2000;
      justify-content: center;
      align-items: center;
      cursor: pointer;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      max-width: 90vw;
      max-height: 90vh;
      position: relative;
    }

    .modal-content img {
      width: 100%;
      max-height: 90vh;
      object-fit: contain;
      border-radius: var(--radius-sm);
    }

    .modal-close {
      position: absolute;
      top: -50px;
      right: 0;
      background: var(--primary-blue);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: white;
      font-size: 1.2rem;
      border: none;
      transition: var(--transition-smooth);
    }

    .modal-close:hover {
      transform: scale(1.1);
    }

    .modal-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: var(--white);
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--dark);
      font-size: 1.2rem;
      transition: all 0.3s;
      border: none;
      box-shadow: var(--shadow-md);
    }

    .modal-nav:hover {
      transform: translateY(-50%) scale(1.1);
      background: var(--primary-blue);
      color: white;
    }

    .modal-prev {
      left: -55px;
    }

    .modal-next {
      right: -55px;
    }

    /* ============ TOAST ============ */
    .toast-message {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--dark);
      color: white;
      padding: 12px 25px;
      border-radius: 50px;
      font-weight: 500;
      z-index: 2001;
      transition: all 0.4s ease;
      opacity: 0;
      visibility: hidden;
      font-size: 0.95rem;
      box-shadow: var(--shadow-lg);
    }

    .toast-message.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
      visibility: visible;
    }

    .toast-message i {
      margin-right: 8px;
    }

    /* ============ RESPONSIVE ============ */
    @media (max-width: 1024px) {
      .salon-details-wrapper {
        grid-template-columns: 1fr;
        gap: 20px;
        padding: 20px 0 40px;
      }
      
      .gallery-section {
        position: relative;
        top: 0;
      }
      
      .main-image img {
        height: 320px;
      }
    }

    @media (max-width: 768px) {
      .premium-nav .nav-inner {
        padding: 0 15px;
        flex-wrap: wrap;
        gap: 10px;
      }

      .nav-logo-text .brand {
        font-size: 1.2rem;
      }

      .back-button span {
        display: none;
      }

      .back-button {
        padding: 8px 14px;
      }

      .container {
        padding: 0 15px;
      }
      
      .info-grid {
        grid-template-columns: 1fr;
        gap: 12px;
      }
      
      .salon-header {
        padding: 18px 20px;
      }

      .salon-header h1 {
        font-size: 1.5rem;
      }
      
      .main-image img {
        height: 220px;
      }
      
      .modal-nav {
        width: 36px;
        height: 36px;
        font-size: 1rem;
      }
      
      .modal-prev {
        left: -40px;
      }
      
      .modal-next {
        right: -40px;
      }
      
      .staff-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      
      .amenities-grid {
        grid-template-columns: 1fr 1fr;
      }

      .offer-banner {
        flex-direction: column;
        text-align: center;
      }

      .offer-code {
        width: 100%;
        text-align: center;
      }
    }

    @media (max-width: 480px) {
      .premium-nav .nav-inner {
        padding: 0 12px;
      }

      .nav-logo-icon {
        width: 32px;
        height: 32px;
      }

      .nav-logo-icon i {
        font-size: 14px;
      }

      .nav-logo-text .brand {
        font-size: 1rem;
      }

      .nav-logo-text .tagline {
        font-size: 0.45rem;
        letter-spacing: 1.5px;
      }

      .nav-actions button {
        width: 34px;
        height: 34px;
        font-size: 0.8rem;
      }

      .salon-header h1 {
        font-size: 1.3rem;
      }

      .info-card {
        padding: 14px 16px;
      }

      .staff-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
      }

      .amenities-grid {
        grid-template-columns: 1fr;
      }

      .btn-book {
        font-size: 0.95rem;
        padding: 14px;
      }

      .modal-nav {
        width: 30px;
        height: 30px;
        font-size: 0.8rem;
      }
      
      .modal-prev {
        left: -30px;
      }
      
      .modal-next {
        right: -30px;
      }
    }
  </style>
</head>
<body>

<!-- Premium Navbar -->
<nav class="premium-nav">
  <div class="nav-inner">
    <!-- GlowBook Logo -->
    <a href="index.html" class="nav-logo">
      <div class="nav-logo-icon">
        <i class="fas fa-spa"></i>
      </div>
      <div class="nav-logo-text">
        <span class="brand">GlowBook</span>
        <span class="tagline">BOOK YOUR GLOW</span>
      </div>
    </a>

    <!-- Back Button + Actions -->
    <div style="display: flex; align-items: center; gap: 12px;">
      <a href="#" class="back-button" onclick="history.back(); return false;">
        <i class="fas fa-arrow-left"></i>
        <span>Back</span>
      </a>
      <div class="nav-actions">
        <button id="shareBtn" title="Share"><i class="fas fa-share-alt"></i></button>
        <button id="saveBtn" title="Save"><i class="far fa-heart"></i></button>
      </div>
    </div>
  </div>
</nav>

<div class="container">
  <div class="salon-details-wrapper">
    <!-- Gallery Section -->
    <div class="gallery-section" data-aos="fade-right">
      <div class="main-image" id="mainImageContainer">
        <img id="mainPhoto" src="" alt="Salon Main Image">
        <div class="image-overlay">
          <span><i class="fas fa-camera"></i> Click to view gallery</span>
          <span id="photoCount"></span>
        </div>
      </div>
      <div class="thumbnail-scroll" id="thumbnailList"></div>
      <div class="image-nav-dots" id="imageNavDots"></div>
    </div>

    <!-- Info Section -->
    <div class="info-section" data-aos="fade-left">
      <!-- Salon Header -->
      <div class="salon-header">
        <h1 id="salonName">Loading...</h1>
        <div class="rating-badge">
          <div class="stars" id="stars"></div>
          <span class="review-count" id="reviewCount">(0 reviews)</span>
        </div>
        <div class="offer-banner">
          <i class="fas fa-gift"></i>
          <div class="offer-text">
            <strong>Welcome Offer!</strong> Get 20% off on your first visit
          </div>
          <span class="offer-code">WELCOME20</span>
        </div>
      </div>

      <!-- Info Grid -->
      <div class="info-grid">
        <!-- Location Card -->
        <div class="info-card">
          <div class="info-card-header">
            <i class="fas fa-map-marker-alt"></i>
            <h3>Location</h3>
          </div>
          <div class="info-content">
            <p><i class="fas fa-location-dot"></i> <span id="fullLocation"></span></p>
            <p><i class="fas fa-city"></i> <span id="city"></span>, <span id="state"></span></p>
            <p><i class="fas fa-mailbox"></i> <span id="pincode"></span></p>
          </div>
        </div>

        <!-- Contact Card -->
        <div class="info-card">
          <div class="info-card-header">
            <i class="fas fa-phone-alt"></i>
            <h3>Contact</h3>
          </div>
          <div class="info-content">
            <p><i class="fas fa-phone"></i> <span id="phone"></span></p>
            <p><i class="fas fa-envelope"></i> <span id="email"></span></p>
            <p><i class="fab fa-instagram"></i> <a id="instagram" href="#" target="_blank">@salonhandle</a></p>
          </div>
        </div>

        <!-- Hours Card -->
        <div class="info-card">
          <div class="info-card-header">
            <i class="fas fa-clock"></i>
            <h3>Business Hours</h3>
          </div>
          <div class="info-content">
            <p><i class="fas fa-calendar-day"></i> <span id="hours"></span></p>
          </div>
        </div>

        <!-- Services Card -->
        <div class="info-card">
          <div class="info-card-header">
            <i class="fas fa-concierge-bell"></i>
            <h3>Services</h3>
          </div>
          <div class="info-content">
            <ul class="services-list" id="servicesFull"></ul>
          </div>
        </div>
      </div>

      <!-- Amenities Card -->
      <div class="info-card">
        <div class="info-card-header">
          <i class="fas fa-spa"></i>
          <h3>Amenities & Facilities</h3>
        </div>
        <div class="amenities-grid" id="amenitiesList"></div>
      </div>

      <!-- Staff Selection Card -->
      <div class="info-card">
        <div class="info-card-header">
          <i class="fas fa-users"></i>
          <h3>Choose Your Stylist</h3>
        </div>
        <div class="staff-grid" id="staffs"></div>
      </div>

      <!-- Book Button -->
      <button class="btn-book" id="bookBtn">
        <i class="fas fa-calendar-check"></i> Book Appointment
      </button>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal" id="photoModal">
  <div class="modal-content">
    <button class="modal-close" id="closeModal">&times;</button>
    <button class="modal-nav modal-prev" id="prevBtn">&#8249;</button>
    <img id="modalImg" src="" alt="Salon Photo">
    <button class="modal-nav modal-next" id="nextBtn">&#8250;</button>
  </div>
</div>

<!-- Toast -->
<div class="toast-message" id="toastMsg">
  <i class="fas fa-check-circle"></i> Booking Confirmed!
</div>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
  AOS.init({ duration: 600, once: true });
  
  // BACKEND API - COMPLETELY PRESERVED
  document.addEventListener('DOMContentLoaded', function() {
    const urlParams = new URLSearchParams(window.location.search);
    const salonId = urlParams.get('id') || 1;

    fetch(`https://salon-booking-backend-vsaz.onrender.com/api/salon-details/${salonId}`)
      .then(res => {
        if (!res.ok) throw new Error('Salon not found');
        return res.json();
      })
      .then(data => {
        if (!data.success) throw new Error(data.message || 'Failed to load salon details');

        const salon = data.data;
        
        // Basic Info - ALL PRESERVED
        document.getElementById("salonName").textContent = salon.salonName || "Unnamed Salon";
        document.getElementById("fullLocation").textContent = salon.fullLocation || "Not specified";
        document.getElementById("city").textContent = salon.city || "Not specified";
        document.getElementById("state").textContent = salon.state || "Not specified";
        document.getElementById("pincode").textContent = salon.pincode || "Not specified";
        document.getElementById("phone").textContent = salon.phone || "Not available";
        document.getElementById("email").textContent = salon.email || "Not available";
        document.getElementById("hours").textContent = formatHours(salon.hours) || "Not available";
        
        // Rating
        const rating = salon.rating || 4.5;
        const reviewCount = salon.reviewCount || 128;
        document.getElementById("reviewCount").textContent = `(${reviewCount} reviews)`;
        updateStars(rating);
        
        // Instagram
        const instagramLink = document.getElementById("instagram");
        if (salon.instagram && salon.instagram.startsWith('http')) {
          instagramLink.href = salon.instagram;
          instagramLink.textContent = "View Profile";
        } else {
          instagramLink.style.display = "none";
        }

        // Services
        const servicesFull = document.getElementById("servicesFull");
        if (salon.services) {
          servicesFull.innerHTML = salon.services.split(',')
            .map(service => {
              const [name, price] = service.split(':');
              return `<li class="service-item"><span class="service-name">${name.trim()}</span><span class="service-price">₹${price || '0'}</span></li>`;
            }).join('');
        } else {
          servicesFull.innerHTML = "<li class='service-item'>No services listed</li>";
        }

        // Amenities
        const amenitiesList = document.getElementById("amenitiesList");
        if (salon.amenities) {
          amenitiesList.innerHTML = salon.amenities.split(',')
            .map(a => `<div class="amenity-tag"><i class="fas fa-check-circle"></i><span>${a.trim()}</span></div>`).join('');
        } else {
          amenitiesList.innerHTML = "<div class='amenity-tag'>No amenities listed</div>";
        }

        // Staff
        const staffDiv = document.getElementById("staffs");
        if (salon.staffs) {
          staffDiv.innerHTML = salon.staffs.split(',')
            .map(staff => `
              <div class="staff-card" data-staff="${staff.trim()}">
                <div class="staff-avatar"><i class="fas fa-user-circle"></i></div>
                <div class="staff-name">${staff.trim()}</div>
                <input type="radio" name="staffs" value="${staff.trim()}">
              </div>
            `).join('');
          
          // Staff selection
          document.querySelectorAll('.staff-card').forEach(card => {
            card.addEventListener('click', function() {
              document.querySelectorAll('.staff-card').forEach(c => c.classList.remove('selected'));
              this.classList.add('selected');
              this.querySelector('input').checked = true;
            });
          });
        } else {
          staffDiv.innerHTML = "<div class='staff-card' style='grid-column: 1/-1;'>No staff listed</div>";
        }

        // Photos
        const mainPhoto = document.getElementById("mainPhoto");
        const thumbnails = document.getElementById("thumbnailList");
        const imageNavDots = document.getElementById("imageNavDots");
        let currentIndex = 0;
        let photoArray = [];

        if (salon.photos) {
          photoArray = typeof salon.photos === 'string' ? salon.photos.split(',') : salon.photos;
          photoArray = photoArray.filter(photo => photo.trim() !== '');
          document.getElementById("photoCount").textContent = `${photoArray.length} photos`;

          if (photoArray.length > 0) {
            updateMainImage();

            // Thumbnails
            photoArray.forEach((photo, i) => {
              const img = document.createElement("img");
              img.src = `https://salon-booking-backend-vsaz.onrender.com/uploads/${photo.trim()}`;
              img.alt = `Photo ${i + 1}`;
              img.onerror = function() {
                this.src = 'https://via.placeholder.com/75x75/EEEEEE/666666?text=No+Image';
              };
              if (i === 0) img.classList.add("active");
              img.addEventListener("click", () => {
                currentIndex = i;
                updateMainImage();
                updateActiveStates();
              });
              thumbnails.appendChild(img);
            });

            // Dots
            photoArray.forEach((_, i) => {
              const dot = document.createElement("div");
              dot.classList.add("dot");
              if (i === 0) dot.classList.add("active");
              dot.addEventListener("click", () => {
                currentIndex = i;
                updateMainImage();
                updateActiveStates();
              });
              imageNavDots.appendChild(dot);
            });
          } else {
            mainPhoto.src = "https://via.placeholder.com/600x400/EEEEEE/666666?text=No+Photos";
          }
        }

        function updateMainImage() {
          if (photoArray.length > 0) {
            mainPhoto.src = `https://salon-booking-backend-vsaz.onrender.com/uploads/${photoArray[currentIndex].trim()}`;
            mainPhoto.onerror = function() {
              this.src = 'https://via.placeholder.com/600x400/EEEEEE/666666?text=No+Image';
            };
          }
        }

        function updateActiveStates() {
          thumbnails.querySelectorAll("img").forEach((img, i) => {
            img.classList.toggle("active", i === currentIndex);
          });
          imageNavDots.querySelectorAll(".dot").forEach((dot, i) => {
            dot.classList.toggle("active", i === currentIndex);
          });
        }

        // Modal
        const modal = document.getElementById("photoModal");
        const modalImg = document.getElementById("modalImg");
        
        mainPhoto.onclick = () => {
          modal.classList.add("active");
          modalImg.src = mainPhoto.src;
        };
        
        document.getElementById("closeModal").onclick = () => modal.classList.remove("active");
        document.getElementById("prevBtn").onclick = () => {
          currentIndex = (currentIndex - 1 + photoArray.length) % photoArray.length;
          modalImg.src = `https://salon-booking-backend-vsaz.onrender.com/uploads/${photoArray[currentIndex].trim()}`;
          updateActiveStates();
        };
        document.getElementById("nextBtn").onclick = () => {
          currentIndex = (currentIndex + 1) % photoArray.length;
          modalImg.src = `https://salon-booking-backend-vsaz.onrender.com/uploads/${photoArray[currentIndex].trim()}`;
          updateActiveStates();
        };
        
        modal.onclick = (e) => { if (e.target === modal) modal.classList.remove("active"); };
        
        // Keyboard nav
        document.addEventListener('keydown', (e) => {
          if (modal.classList.contains("active")) {
            if (e.key === "Escape") modal.classList.remove("active");
            if (e.key === "ArrowLeft") document.getElementById("prevBtn").click();
            if (e.key === "ArrowRight") document.getElementById("nextBtn").click();
          }
        });

        // Booking button - BACKEND PRESERVED
        document.getElementById("bookBtn").addEventListener("click", (e) => {
          e.preventDefault();
          const selectedStaff = document.querySelector('input[name="staffs"]:checked');
          if (!selectedStaff) {
            showToast("Please select a staff member", "error");
            return;
          }
          const salonName = document.getElementById("salonName").textContent;
          window.location.href = `book.html?salonId=${salonId}&staff=${encodeURIComponent(selectedStaff.value)}&salonName=${encodeURIComponent(salonName)}`;
        });

        function formatHours(hoursString) {
          if (!hoursString) return null;
          return hoursString.replace(/\?/g, '-');
        }
        
        function updateStars(rating) {
          const starsContainer = document.getElementById("stars");
          const fullStars = Math.floor(rating);
          const hasHalfStar = rating % 1 >= 0.5;
          starsContainer.innerHTML = '';
          for (let i = 0; i < fullStars; i++) starsContainer.innerHTML += '<i class="fas fa-star"></i>';
          if (hasHalfStar) starsContainer.innerHTML += '<i class="fas fa-star-half-alt"></i>';
          for (let i = 0; i < 5 - Math.ceil(rating); i++) starsContainer.innerHTML += '<i class="far fa-star"></i>';
        }
      })
      .catch(err => {
        console.error("Error:", err);
        document.querySelector(".salon-details-wrapper").innerHTML = `
          <div style="text-align: center; padding: 50px; grid-column: 1/-1;">
            <h2 style="color: var(--primary-blue); font-family: 'Playfair Display', serif;">Error Loading Salon</h2>
            <p style="color: var(--gray);">${err.message}</p>
            <a href="index.html" style="color: var(--primary-blue); text-decoration: none; font-weight: 600; display: inline-block; margin-top: 15px;">← Return Home</a>
          </div>
        `;
      });

    function showToast(msg, type = "success") {
      const toast = document.getElementById("toastMsg");
      const icon = type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle';
      toast.innerHTML = `<i class="fas ${icon}"></i> ${msg}`;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 3000);
    }
    
    // Share button
    document.getElementById("shareBtn")?.addEventListener("click", () => {
      if (navigator.share) {
        navigator.share({ 
          title: document.getElementById("salonName").textContent, 
          url: window.location.href 
        });
      } else {
        showToast("Share feature not supported", "error");
      }
    });
    
    // Save button
    document.getElementById("saveBtn")?.addEventListener("click", function() {
      const icon = this.querySelector("i");
      if (icon.classList.contains("far")) {
        icon.classList.remove("far");
        icon.classList.add("fas");
        icon.style.color = '#0066FF';
        showToast("Saved to favorites!");
      } else {
        icon.classList.remove("fas");
        icon.classList.add("far");
        icon.style.color = '';
        showToast("Removed from favorites");
      }
    });
  });
</script>
</body>
</html>
