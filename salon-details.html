<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Salon Details | Salon Elegance</title>
  
  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  
  <!-- Google Fonts - Luxury -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  
  <style>
    :root {
      --bg-dark: #0a0a0a;
      --bg-card: #111111;
      --bg-elevated: #1a1a1a;
      --gold-primary: #D4AF37;
      --gold-light: #F3E5AB;
      --gold-dark: #B8960C;
      --white-soft: #fafafa;
      --gray-muted: #888888;
      --border-glow: rgba(212, 175, 55, 0.2);
      --transition-smooth: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      --radius: 20px;
      --shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0a0a0a 100%);
      color: var(--white-soft);
      line-height: 1.6;
      min-height: 100vh;
      position: relative;
    }

    /* Animated Background */
    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at 20% 50%, rgba(212, 175, 55, 0.08) 0%, transparent 50%);
      pointer-events: none;
    }

    .container {
      max-width: 1200px;
      margin: 80px auto 20px;
      background: rgba(17, 17, 17, 0.95);
      backdrop-filter: blur(10px);
      border-radius: var(--radius);
      border: 1px solid rgba(212, 175, 55, 0.15);
      overflow: hidden;
      position: relative;
      z-index: 1;
    }

    /* Header */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 30px;
      border-bottom: 1px solid rgba(212, 175, 55, 0.1);
      background: rgba(17, 17, 17, 0.98);
    }

    .back-button {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--gold-primary);
      text-decoration: none;
      font-weight: 500;
      transition: var(--transition-smooth);
    }

    .back-button:hover {
      color: var(--gold-light);
      transform: translateX(-3px);
    }

    .header-actions {
      display: flex;
      gap: 15px;
    }

    .header-actions button {
      background: none;
      border: none;
      color: var(--gray-muted);
      font-size: 18px;
      cursor: pointer;
      transition: var(--transition-smooth);
      width: 40px;
      height: 40px;
      border-radius: 50%;
    }

    .header-actions button:hover {
      color: var(--gold-primary);
      background: rgba(212, 175, 55, 0.1);
    }

    /* Main Content */
    .main-content {
      display: flex;
      flex-wrap: wrap;
      padding: 0 30px 30px;
      gap: 30px;
    }

    .image-gallery, .details-section {
      flex: 1;
      min-width: 300px;
    }

    /* Image Gallery */
    .main-image-container {
      position: relative;
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid rgba(212, 175, 55, 0.2);
    }

    .main-image-container img {
      width: 100%;
      height: 350px;
      object-fit: cover;
      transition: transform 0.4s ease;
      cursor: zoom-in;
    }

    .main-image-container img:hover {
      transform: scale(1.02);
    }

    .image-nav {
      position: absolute;
      bottom: 15px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    .image-nav-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.4);
      cursor: pointer;
      transition: all 0.3s;
    }

    .image-nav-dot.active {
      background: var(--gold-primary);
      transform: scale(1.3);
    }

    .thumbnail-row {
      display: flex;
      gap: 12px;
      margin-top: 15px;
      overflow-x: auto;
      padding: 5px 0;
    }

    .thumbnail-row img {
      width: 80px;
      height: 80px;
      border-radius: 12px;
      object-fit: cover;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.3s;
    }

    .thumbnail-row img.active,
    .thumbnail-row img:hover {
      border-color: var(--gold-primary);
      transform: translateY(-3px);
    }

    /* Typography */
    h1 {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 10px;
      font-family: 'Playfair Display', serif;
      color: var(--gold-primary);
    }

    .rating {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--gray-muted);
      margin-bottom: 20px;
    }

    .stars {
      color: var(--gold-primary);
    }

    /* Cards */
    .details-card {
      background: var(--bg-elevated);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 24px;
      border: 1px solid rgba(212, 175, 55, 0.1);
      transition: var(--transition-smooth);
    }

    .details-card:hover {
      border-color: rgba(212, 175, 55, 0.2);
    }

    .card-title {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 20px;
      color: var(--white-soft);
      font-family: 'Playfair Display', serif;
    }

    .card-title i {
      color: var(--gold-primary);
      font-size: 22px;
    }

    .detail-item {
      display: flex;
      margin-bottom: 14px;
      font-size: 14px;
    }

    .detail-item strong {
      min-width: 100px;
      font-weight: 500;
      color: var(--gold-primary);
    }

    .detail-item span, .detail-item a {
      color: var(--gray-muted);
    }

    .detail-item a {
      color: var(--gold-primary);
      text-decoration: none;
      transition: var(--transition-smooth);
    }

    .detail-item a:hover {
      color: var(--gold-light);
      text-decoration: underline;
    }

    /* Services List */
    .services-list {
      list-style: none;
    }

    .services-list li {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid rgba(212, 175, 55, 0.1);
      color: var(--gray-muted);
    }

    .services-list li:last-child {
      border-bottom: none;
    }

    .services-list li span:first-child {
      font-weight: 500;
    }

    .services-list li span:last-child {
      color: var(--gold-primary);
      font-weight: 600;
    }

    /* Amenities Grid */
    .amenities-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
      margin-top: 10px;
    }

    .amenity-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      color: var(--gray-muted);
    }

    .amenity-item i {
      color: var(--gold-primary);
      font-size: 14px;
    }

    /* Staff Grid */
    .staff-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 15px;
      margin-top: 15px;
    }

    .staff-item {
      position: relative;
      border: 2px solid rgba(212, 175, 55, 0.15);
      border-radius: var(--radius);
      padding: 15px;
      text-align: center;
      transition: all 0.3s;
      cursor: pointer;
      background: var(--bg-card);
    }

    .staff-item:hover {
      border-color: var(--gold-primary);
      transform: translateY(-5px);
    }

    .staff-item.selected {
      border-color: var(--gold-primary);
      background: rgba(212, 175, 55, 0.1);
    }

    .staff-item input[type="radio"] {
      position: absolute;
      opacity: 0;
    }

    .staff-avatar i {
      font-size: 48px;
      color: var(--gray-muted);
    }

    .staff-name {
      margin-top: 10px;
      font-weight: 500;
      font-size: 14px;
      color: var(--white-soft);
    }

    /* Special Offer */
    .special-offer {
      background: linear-gradient(135deg, var(--gold-primary), var(--gold-dark));
      color: #0a0a0a;
      padding: 15px 20px;
      border-radius: var(--radius);
      margin: 20px 0;
      text-align: center;
      font-weight: 600;
    }

    .special-offer i {
      margin-right: 10px;
    }

    /* Book Button */
    .btn-book {
      display: block;
      width: 100%;
      background: linear-gradient(135deg, var(--gold-primary), var(--gold-dark));
      color: #0a0a0a;
      padding: 16px;
      border: none;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 20px;
      transition: var(--transition-smooth);
      text-align: center;
      text-decoration: none;
    }

    .btn-book:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(212, 175, 55, 0.4);
    }

    /* Toast Notification */
    .toast {
      position: fixed;
      left: 50%;
      bottom: 30px;
      transform: translateX(-50%) translateY(20px);
      background: linear-gradient(135deg, var(--gold-primary), var(--gold-dark));
      color: #0a0a0a;
      padding: 12px 24px;
      border-radius: 50px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      opacity: 0;
      visibility: hidden;
      transition: all 0.4s ease;
      z-index: 10000;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .toast.show {
      opacity: 1;
      visibility: visible;
      transform: translateX(-50%) translateY(0);
    }

    /* Modal */
    #photoModal {
      display: none;
      position: fixed;
      z-index: 9999;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.95);
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    #modalContent {
      max-width: 90vw;
      max-height: 90vh;
      position: relative;
    }

    #modalImg {
      width: 100%;
      max-height: 90vh;
      object-fit: contain;
      border-radius: 12px;
    }

    .modal-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(212, 175, 55, 0.9);
      border: none;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      font-size: 24px;
      cursor: pointer;
      color: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
    }

    .modal-btn:hover {
      background: var(--gold-primary);
      transform: translateY(-50%) scale(1.05);
    }

    #prevBtn { left: -60px; }
    #nextBtn { right: -60px; }

    #closeBtn {
      position: absolute;
      top: -45px;
      right: 0;
      background: rgba(212, 175, 55, 0.9);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #0a0a0a;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .container {
        margin: 0;
        border-radius: 0;
      }
      
      header {
        padding: 15px 20px;
      }
      
      .main-content {
        padding: 0 20px 20px;
        gap: 20px;
      }
      
      h1 {
        font-size: 24px;
      }
      
      .amenities-grid,
      .staff-grid {
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      }
      
      .modal-btn {
        width: 40px;
        height: 40px;
        font-size: 18px;
      }
      
      #prevBtn { left: -45px; }
      #nextBtn { right: -45px; }
      
      .btn-book {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        border-radius: 0;
        z-index: 1000;
        margin-top: 0;
        padding: 16px;
      }
    }

    @media (max-width: 480px) {
      .staff-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    /* Error State */
    .error-container {
      text-align: center;
      padding: 50px;
    }

    .error-container h2 {
      color: var(--gold-primary);
      margin-bottom: 20px;
    }

    .error-container a {
      color: var(--gold-primary);
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <a href="#" class="back-button" onclick="history.back(); return false;">
        <i class="fas fa-arrow-left"></i>
        <span>Back</span>
      </a>
      <div class="header-actions">
        <button title="Share" id="shareBtn"><i class="fas fa-share-alt"></i></button>
        <button title="Save" id="saveBtn"><i class="far fa-heart"></i></button>
      </div>
    </header>
    
    <div class="main-content">
      <div class="image-gallery">
        <div class="main-image-container">
          <img id="mainPhoto" src="" alt="Salon Gallery" />
          <div class="image-nav" id="imageNav"></div>
        </div>
        <div class="thumbnail-row" id="thumbnailList"></div>
      </div>
      
      <div class="details-section">
        <h1 id="salonName">Loading...</h1>
        <div class="rating">
          <div class="stars" id="stars">
            <i class="fas fa-star"></i>
            <i class="fas fa-star"></i>
            <i class="fas fa-star"></i>
            <i class="fas fa-star"></i>
            <i class="fas fa-star-half-alt"></i>
          </div>
          <span id="reviewCount">(Loading reviews)</span>
        </div>
        
        <div class="special-offer" id="specialOffer">
          <i class="fas fa-gift"></i> Get 20% off your first visit! Use code: WELCOME20
        </div>
        
        <div class="details-card">
          <div class="card-title">
            <i class="fas fa-info-circle"></i>
            <span>Salon Information</span>
          </div>
          <div class="detail-item">
            <strong>📍 Location:</strong>
            <span id="fullLocation"></span>
          </div>
          <div class="detail-item">
            <strong>🏙️ City:</strong>
            <span id="city"></span>
          </div>
          <div class="detail-item">
            <strong>🗺️ State:</strong>
            <span id="state"></span>
          </div>
          <div class="detail-item">
            <strong>📮 Pincode:</strong>
            <span id="pincode"></span>
          </div>
          <div class="detail-item">
            <strong>📞 Phone:</strong>
            <span id="phone"></span>
          </div>
          <div class="detail-item">
            <strong>✉️ Email:</strong>
            <span id="email"></span>
          </div>
          <div class="detail-item">
            <strong>🕐 Hours:</strong>
            <span id="hours"></span>
          </div>
          <div class="detail-item">
            <strong>📷 Instagram:</strong>
            <a id="instagram" target="_blank" href="#">@salonhandle</a>
          </div>
        </div>
        
        <div class="details-card">
          <div class="card-title">
            <i class="fas fa-concierge-bell"></i>
            <span>Services & Pricing</span>
          </div>
          <ul class="services-list" id="servicesFull"></ul>
        </div>
        
        <div class="details-card">
          <div class="card-title">
            <i class="fas fa-spa"></i>
            <span>Amenities</span>
          </div>
          <div class="amenities-grid" id="amenitiesList"></div>
        </div>
        
        <div class="details-card">
          <div class="card-title">
            <i class="fas fa-users"></i>
            <span>Choose Your Stylist</span>
          </div>
          <div class="staff-grid" id="staffs"></div>
        </div>
        
        <a href="#" class="btn-book" id="bookBtn">
          <i class="fas fa-calendar-check"></i> Book Appointment
        </a>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div id="photoModal">
    <div id="modalContent">
      <button id="closeBtn">&times;</button>
      <button class="modal-btn" id="prevBtn">&#8249;</button>
      <img id="modalImg" src="" />
      <button class="modal-btn" id="nextBtn">&#8250;</button>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast">
    <i class="fas fa-check-circle"></i> Booking Confirmed
  </div>

  <script>
    // BACKEND API - COMPLETELY PRESERVED
    document.addEventListener('DOMContentLoaded', function() {
      const urlParams = new URLSearchParams(window.location.search);
      const salonId = urlParams.get('id') || 1;

      fetch(`https://salon-booking-backend-vsaz.onrender.com/api/salon-details/${salonId}`)
        .then(res => {
          if (!res.ok) {
            throw new Error('Salon not found');
          }
          return res.json();
        })
        .then(data => {
          if (!data.success) {
            throw new Error(data.message || 'Failed to load salon details');
          }

          const salon = data.data;
          
          // Basic Info - ALL PRESERVED
          document.getElementById("salonName").textContent = salon.salonName || "Unnamed Salon";
          document.getElementById("fullLocation").textContent = salon.fullLocation || "Not specified";
          document.getElementById("city").textContent = salon.city || "Not specified";
          document.getElementById("state").textContent = salon.state || "Not specified";
          document.getElementById("pincode").textContent = salon.pincode || "Not specified";
          document.getElementById("phone").textContent = salon.phone || "Not available";
          document.getElementById("email").textContent = salon.email || "Not available";
          document.getElementById("hours").textContent = formatHours(salon.hours) || "Not available";
          
          // Set rating
          const rating = salon.rating || 4.5;
          const reviewCount = salon.reviewCount || 128;
          document.getElementById("reviewCount").textContent = `(${reviewCount} reviews)`;
          updateStars(rating);
          
          // Instagram Link
          const instagramLink = document.getElementById("instagram");
          if (salon.instagram && salon.instagram.startsWith('http')) {
            instagramLink.href = salon.instagram;
            instagramLink.textContent = "Visit Instagram";
          } else {
            instagramLink.style.display = "none";
          }

          // Services - ALL PRESERVED
          const servicesFull = document.getElementById("servicesFull");
          if (salon.services) {
            const servicesList = salon.services.split(',')
              .map(service => {
                const [name, price] = service.split(':');
                return `<li><span>${name.trim()}</span><span>₹${price || '0'}</span></li>`;
              })
              .join('');
            servicesFull.innerHTML = servicesList;
          } else {
            servicesFull.innerHTML = "<li>No services listed</li>";
          }

          // Amenities - ALL PRESERVED
          const amenitiesList = document.getElementById("amenitiesList");
          if (salon.amenities) {
            amenitiesList.innerHTML = salon.amenities.split(',')
              .map(a => `
                <div class="amenity-item">
                  <i class="fas fa-check-circle"></i>
                  <span>${a.trim()}</span>
                </div>
              `)
              .join('');
          } else {
            amenitiesList.innerHTML = "<div class='amenity-item'><i class='fas fa-check-circle'></i><span>No amenities listed</span></div>";
          }

          // Staff - ALL PRESERVED
          const staffDiv = document.getElementById("staffs");
          if (salon.staffs) {
            staffDiv.innerHTML = salon.staffs.split(',')
              .map(staff => `
                <label class="staff-item">
                  <input type="radio" name="staffs" value="${staff.trim()}"/>
                  <div class="staff-avatar">
                    <i class="fas fa-user-circle"></i>
                  </div>
                  <div class="staff-name">${staff.trim()}</div>
                </label>
              `)
              .join('');
            
            // Add event listeners for staff selection
            const staffItems = staffDiv.querySelectorAll('.staff-item');
            staffItems.forEach(item => {
              item.addEventListener('click', function() {
                staffItems.forEach(i => i.classList.remove('selected'));
                this.classList.add('selected');
                this.querySelector('input[type="radio"]').checked = true;
              });
            });
          } else {
            staffDiv.innerHTML = "<p>No staff listed</p>";
          }

          // Photos - ALL PRESERVED
          const mainPhoto = document.getElementById("mainPhoto");
          const thumbnails = document.getElementById("thumbnailList");
          const imageNav = document.getElementById("imageNav");
          let currentIndex = 0;
          let photoArray = [];

          if (salon.photos) {
            photoArray = typeof salon.photos === 'string' 
              ? salon.photos.split(',') 
              : salon.photos;
            
            photoArray = photoArray.filter(photo => photo.trim() !== '');

            if (photoArray.length > 0) {
              updateMainImage();

              // Create navigation dots
              imageNav.innerHTML = '';
              photoArray.forEach((_, i) => {
                const dot = document.createElement("div");
                dot.classList.add("image-nav-dot");
                if (i === 0) dot.classList.add("active");
                dot.addEventListener("click", () => {
                  currentIndex = i;
                  updateMainImage();
                  updateThumbnailHighlight();
                  updateNavDots();
                });
                imageNav.appendChild(dot);
              });

              // Create thumbnails
              photoArray.forEach((photo, i) => {
                const img = document.createElement("img");
                img.src = `https://salon-booking-backend-vsaz.onrender.com/uploads/${photo.trim()}`;
                img.alt = `Salon photo ${i + 1}`;
                if (i === 0) img.classList.add("active");
                img.addEventListener("click", () => {
                  currentIndex = i;
                  updateMainImage();
                  updateThumbnailHighlight();
                  updateNavDots();
                });
                thumbnails.appendChild(img);
              });
            } else {
              mainPhoto.src = "https://via.placeholder.com/600x400?text=No+Photos";
              thumbnails.innerHTML = "<p>No photos available</p>";
            }
          }

          function updateMainImage() {
            if (photoArray.length > 0) {
              mainPhoto.src = `https://salon-booking-backend-vsaz.onrender.com/uploads/${photoArray[currentIndex].trim()}`;
              mainPhoto.onclick = () => {
                document.getElementById("photoModal").style.display = "flex";
                document.getElementById("modalImg").src = mainPhoto.src;
              };
            }
          }

          function updateThumbnailHighlight() {
            thumbnails.querySelectorAll("img").forEach((img, idx) => {
              img.classList.toggle("active", idx === currentIndex);
            });
          }

          function updateNavDots() {
            imageNav.querySelectorAll(".image-nav-dot").forEach((dot, idx) => {
              dot.classList.toggle("active", idx === currentIndex);
            });
          }

          function updateStars(rating) {
            const starsContainer = document.getElementById("stars");
            const fullStars = Math.floor(rating);
            const hasHalfStar = rating % 1 >= 0.5;
            
            starsContainer.innerHTML = '';
            for (let i = 0; i < fullStars; i++) {
              starsContainer.innerHTML += '<i class="fas fa-star"></i>';
            }
            if (hasHalfStar) {
              starsContainer.innerHTML += '<i class="fas fa-star-half-alt"></i>';
            }
            const remainingStars = 5 - Math.ceil(rating);
            for (let i = 0; i < remainingStars; i++) {
              starsContainer.innerHTML += '<i class="far fa-star"></i>';
            }
          }

          // Modal Navigation - ALL PRESERVED
          document.getElementById("closeBtn").onclick = closeModal;
          document.getElementById("prevBtn").onclick = showPrevPhoto;
          document.getElementById("nextBtn").onclick = showNextPhoto;

          function closeModal() {
            document.getElementById("photoModal").style.display = "none";
          }

          function showPrevPhoto() {
            currentIndex = (currentIndex - 1 + photoArray.length) % photoArray.length;
            document.getElementById("modalImg").src = `https://salon-booking-backend-vsaz.onrender.com/uploads/${photoArray[currentIndex].trim()}`;
            updateThumbnailHighlight();
            updateNavDots();
          }

          function showNextPhoto() {
            currentIndex = (currentIndex + 1) % photoArray.length;
            document.getElementById("modalImg").src = `https://salon-booking-backend-vsaz.onrender.com/uploads/${photoArray[currentIndex].trim()}`;
            updateThumbnailHighlight();
            updateNavDots();
          }

          // Keyboard navigation
          document.addEventListener('keydown', function(e) {
            if (document.getElementById("photoModal").style.display === "flex") {
              if (e.key === "Escape") closeModal();
              if (e.key === "ArrowLeft") showPrevPhoto();
              if (e.key === "ArrowRight") showNextPhoto();
            }
          });

          document.getElementById("photoModal").addEventListener("click", (e) => {
            if (e.target.id === "photoModal") closeModal();
          });

          // Booking button - BACKEND PRESERVED
          document.getElementById("bookBtn").addEventListener("click", (e) => {
            e.preventDefault();
            const selectedStaff = document.querySelector('input[name="staffs"]:checked');
            if (!selectedStaff) {
              showToast("Please select a staff member");
              return;
            }
            
            const salonName = document.getElementById("salonName").textContent;
            const encodedSalonName = encodeURIComponent(salonName);
            
            window.location.href = `book.html?salonId=${salonId}&staff=${encodeURIComponent(selectedStaff.value)}&salonName=${encodedSalonName}`;
          });

          function formatHours(hoursString) {
            if (!hoursString) return null;
            return hoursString.replace(/\?/g, '-');
          }
        })
        .catch(err => {
          console.error("Error loading salon details:", err);
          document.querySelector(".container").innerHTML = `
            <div class="error-container">
              <h2>Error Loading Salon</h2>
              <p>${err.message}</p>
              <a href="/">Return to Home</a>
            </div>
          `;
        });

      function showToast(msg) {
        const toast = document.getElementById("toast");
        toast.innerHTML = `<i class="fas fa-info-circle"></i> ${msg}`;
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 3000);
      }
      
      // Share functionality
      document.getElementById("shareBtn")?.addEventListener("click", () => {
        if (navigator.share) {
          navigator.share({
            title: document.getElementById("salonName").textContent,
            url: window.location.href
          });
        } else {
          showToast("Share feature not supported");
        }
      });
      
      // Save functionality
      document.getElementById("saveBtn")?.addEventListener("click", function() {
        const icon = this.querySelector("i");
        if (icon.classList.contains("far")) {
          icon.classList.remove("far");
          icon.classList.add("fas");
          showToast("Saved to favorites!");
        } else {
          icon.classList.remove("fas");
          icon.classList.add("far");
          showToast("Removed from favorites");
        }
      });
    });
  </script>
</body>
</html>
