<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Salon Elegance | Premium Salon Details</title>
  
  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  
  <!-- AOS Animation -->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg-dark: #0a0a0a;
      --bg-card: #111111;
      --bg-elevated: #1a1a1a;
      --gold-primary: #D4AF37;
      --gold-light: #F3E5AB;
      --gold-dark: #B8960C;
      --white-soft: #fafafa;
      --gray-muted: #888888;
      --border-glow: rgba(212, 175, 55, 0.2);
      --transition-smooth: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      --shadow-sm: 0 4px 20px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 8px 30px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 20px 50px rgba(0, 0, 0, 0.5);
      --radius-sm: 12px;
      --radius-md: 20px;
      --radius-lg: 30px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0a0a0a 100%);
      color: var(--white-soft);
      line-height: 1.6;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    /* Animated Background Particles */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at 20% 50%, rgba(212, 175, 55, 0.08) 0%, transparent 50%),
                  radial-gradient(circle at 80% 80%, rgba(212, 175, 55, 0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* Floating Animation */
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    @keyframes slideInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .container {
      max-width: 1300px;
      margin: 100px auto 30px;
      position: relative;
      z-index: 1;
      padding: 0 20px;
    }

    /* Premium Navbar */
    .premium-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: rgba(10, 10, 10, 0.95);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(212, 175, 55, 0.15);
      padding: 15px 30px;
      z-index: 1000;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--gold-primary);
      text-decoration: none;
    }

    .nav-logo i {
      font-size: 1.8rem;
    }

    .back-button {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(212, 175, 55, 0.1);
      padding: 10px 20px;
      border-radius: 50px;
      color: var(--gold-primary);
      text-decoration: none;
      font-weight: 500;
      transition: var(--transition-smooth);
      border: 1px solid rgba(212, 175, 55, 0.2);
    }

    .back-button:hover {
      background: rgba(212, 175, 55, 0.2);
      transform: translateX(-3px);
    }

    .nav-actions {
      display: flex;
      gap: 12px;
    }

    .nav-actions button {
      background: rgba(212, 175, 55, 0.1);
      border: 1px solid rgba(212, 175, 55, 0.2);
      width: 42px;
      height: 42px;
      border-radius: 50%;
      color: var(--gold-primary);
      cursor: pointer;
      transition: var(--transition-smooth);
    }

    .nav-actions button:hover {
      background: rgba(212, 175, 55, 0.2);
      transform: translateY(-2px);
    }

    /* Main Content Layout */
    .salon-details-wrapper {
      display: grid;
      grid-template-columns: 1fr 1.2fr;
      gap: 30px;
      animation: slideInUp 0.6s ease-out;
    }

    /* Image Gallery Section */
    .gallery-section {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      border: 1px solid rgba(212, 175, 55, 0.15);
      overflow: hidden;
      padding: 20px;
      position: sticky;
      top: 100px;
    }

    .main-image {
      position: relative;
      border-radius: var(--radius-md);
      overflow: hidden;
      cursor: pointer;
      margin-bottom: 15px;
    }

    .main-image img {
      width: 100%;
      height: 400px;
      object-fit: cover;
      transition: transform 0.5s ease;
    }

    .main-image:hover img {
      transform: scale(1.05);
    }

    .image-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
      padding: 20px;
      display: flex;
      justify-content: space-between;
      color: white;
    }

    .thumbnail-scroll {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding: 10px 0;
    }

    .thumbnail-scroll img {
      width: 85px;
      height: 85px;
      border-radius: var(--radius-sm);
      object-fit: cover;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.3s;
    }

    .thumbnail-scroll img.active,
    .thumbnail-scroll img:hover {
      border-color: var(--gold-primary);
      transform: translateY(-3px);
    }

    .image-nav-dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 15px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      cursor: pointer;
      transition: all 0.3s;
    }

    .dot.active {
      background: var(--gold-primary);
      width: 25px;
      border-radius: 4px;
    }

    /* Info Section */
    .info-section {
      display: flex;
      flex-direction: column;
      gap: 25px;
    }

    /* Salon Header Card */
    .salon-header {
      background: var(--bg-card);
      border-radius: var(--radius-md);
      padding: 25px;
      border: 1px solid rgba(212, 175, 55, 0.15);
    }

    .salon-header h1 {
      font-size: 2.2rem;
      font-family: 'Playfair Display', serif;
      color: var(--gold-primary);
      margin-bottom: 12px;
    }

    .rating-badge {
      display: flex;
      align-items: center;
      gap: 15px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .stars {
      color: var(--gold-primary);
      font-size: 1rem;
    }

    .review-count {
      color: var(--gray-muted);
      font-size: 0.9rem;
    }

    .offer-banner {
      background: linear-gradient(135deg, rgba(212, 175, 55, 0.15), rgba(212, 175, 55, 0.05));
      border: 1px solid rgba(212, 175, 55, 0.3);
      border-radius: var(--radius-sm);
      padding: 15px 20px;
      display: flex;
      align-items: center;
      gap: 15px;
      flex-wrap: wrap;
      margin-top: 15px;
    }

    .offer-banner i {
      font-size: 2rem;
      color: var(--gold-primary);
    }

    .offer-banner .offer-text {
      flex: 1;
    }

    .offer-banner .offer-text strong {
      color: var(--gold-primary);
      font-size: 1.1rem;
    }

    .offer-code {
      background: var(--gold-primary);
      color: #0a0a0a;
      padding: 8px 16px;
      border-radius: 50px;
      font-weight: 700;
      font-family: monospace;
      letter-spacing: 1px;
    }

    /* Info Cards Grid */
    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    .info-card {
      background: var(--bg-card);
      border-radius: var(--radius-md);
      padding: 20px;
      border: 1px solid rgba(212, 175, 55, 0.15);
      transition: var(--transition-smooth);
    }

    .info-card:hover {
      border-color: rgba(212, 175, 55, 0.3);
      transform: translateY(-3px);
    }

    .info-card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 15px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(212, 175, 55, 0.1);
    }

    .info-card-header i {
      font-size: 1.3rem;
      color: var(--gold-primary);
    }

    .info-card-header h3 {
      font-size: 1rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .info-content p {
      margin: 8px 0;
      font-size: 0.9rem;
      color: var(--gray-muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .info-content p i {
      width: 20px;
      color: var(--gold-primary);
    }

    /* Services List */
    .services-list {
      list-style: none;
    }

    .service-item {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid rgba(212, 175, 55, 0.1);
    }

    .service-item:last-child {
      border-bottom: none;
    }

    .service-name {
      font-weight: 500;
    }

    .service-price {
      color: var(--gold-primary);
      font-weight: 600;
    }

    /* Amenities Grid */
    .amenities-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .amenity-tag {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      color: var(--gray-muted);
      padding: 6px 0;
    }

    .amenity-tag i {
      color: var(--gold-primary);
      font-size: 0.8rem;
    }

    /* Staff Grid */
    .staff-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 15px;
    }

    .staff-card {
      background: var(--bg-elevated);
      border: 2px solid rgba(212, 175, 55, 0.15);
      border-radius: var(--radius-sm);
      padding: 15px 10px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
    }

    .staff-card:hover {
      border-color: var(--gold-primary);
      transform: translateY(-3px);
    }

    .staff-card.selected {
      border-color: var(--gold-primary);
      background: rgba(212, 175, 55, 0.1);
    }

    .staff-avatar {
      font-size: 3rem;
      color: var(--gray-muted);
      margin-bottom: 8px;
    }

    .staff-name {
      font-weight: 500;
      font-size: 0.85rem;
    }

    .staff-card input {
      display: none;
    }

    /* Book Button */
    .book-btn-container {
      position: sticky;
      bottom: 20px;
      margin-top: 20px;
    }

    .btn-book {
      display: block;
      width: 100%;
      background: linear-gradient(135deg, var(--gold-primary), var(--gold-dark));
      color: #0a0a0a;
      padding: 18px;
      border: none;
      border-radius: 60px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      text-align: center;
      text-decoration: none;
      box-shadow: 0 5px 20px rgba(212, 175, 55, 0.3);
    }

    .btn-book:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 35px rgba(212, 175, 55, 0.5);
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.96);
      z-index: 2000;
      justify-content: center;
      align-items: center;
      cursor: pointer;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      max-width: 90vw;
      max-height: 90vh;
      position: relative;
    }

    .modal-content img {
      width: 100%;
      max-height: 90vh;
      object-fit: contain;
      border-radius: 12px;
    }

    .modal-close {
      position: absolute;
      top: -50px;
      right: 0;
      background: var(--gold-primary);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #0a0a0a;
      font-size: 1.2rem;
    }

    .modal-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: var(--gold-primary);
      width: 45px;
      height: 45px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #0a0a0a;
      font-size: 1.5rem;
      transition: all 0.3s;
    }

    .modal-nav:hover {
      transform: translateY(-50%) scale(1.1);
    }

    .modal-prev {
      left: -60px;
    }

    .modal-next {
      right: -60px;
    }

    /* Toast */
    .toast-message {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: linear-gradient(135deg, var(--gold-primary), var(--gold-dark));
      color: #0a0a0a;
      padding: 12px 25px;
      border-radius: 50px;
      font-weight: 600;
      z-index: 2001;
      transition: all 0.3s;
      opacity: 0;
      visibility: hidden;
    }

    .toast-message.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
      visibility: visible;
    }

    /* Loading Skeleton */
    .skeleton {
      background: linear-gradient(90deg, var(--bg-card) 25%, var(--bg-elevated) 50%, var(--bg-card) 75%);
      background-size: 200% 100%;
      animation: loading 1.5s infinite;
      border-radius: var(--radius-sm);
    }

    @keyframes loading {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Responsive */
    @media (max-width: 1024px) {
      .salon-details-wrapper {
        grid-template-columns: 1fr;
        gap: 20px;
      }
      
      .gallery-section {
        position: relative;
        top: 0;
      }
      
      .main-image img {
        height: 350px;
      }
    }

    @media (max-width: 768px) {
      .premium-nav {
        padding: 12px 20px;
      }
      
      .container {
        margin: 80px auto 20px;
        padding: 0 15px;
      }
      
      .info-grid {
        grid-template-columns: 1fr;
        gap: 15px;
      }
      
      .salon-header h1 {
        font-size: 1.6rem;
      }
      
      .main-image img {
        height: 250px;
      }
      
      .modal-nav {
        width: 35px;
        height: 35px;
        font-size: 1rem;
      }
      
      .modal-prev {
        left: -45px;
      }
      
      .modal-next {
        right: -45px;
      }
    }

    @media (max-width: 480px) {
      .nav-logo span {
        display: none;
      }
      
      .staff-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      
      .amenities-grid {
        grid-template-columns: 1fr;
      }
      
      .offer-banner {
        flex-direction: column;
        text-align: center;
      }
    }
  </style>
</head>
<body>

<!-- Premium Navbar -->
<nav class="premium-nav">
  <a href="index.html" class="nav-logo">
    <i class="fas fa-spa"></i>
    <span>Salon Elegance</span>
  </a>
  <a href="#" class="back-button" onclick="history.back(); return false;">
    <i class="fas fa-arrow-left"></i>
    <span>Back</span>
  </a>
  <div class="nav-actions">
    <button id="shareBtn" title="Share"><i class="fas fa-share-alt"></i></button>
    <button id="saveBtn" title="Save"><i class="far fa-heart"></i></button>
  </div>
</nav>

<div class="container">
  <div class="salon-details-wrapper">
    <!-- Gallery Section -->
    <div class="gallery-section" data-aos="fade-right">
      <div class="main-image" id="mainImageContainer">
        <img id="mainPhoto" src="" alt="Salon Main Image">
        <div class="image-overlay">
          <span><i class="fas fa-camera"></i> Click to view gallery</span>
          <span id="photoCount"></span>
        </div>
      </div>
      <div class="thumbnail-scroll" id="thumbnailList"></div>
      <div class="image-nav-dots" id="imageNavDots"></div>
    </div>

    <!-- Info Section -->
    <div class="info-section" data-aos="fade-left">
      <!-- Salon Header -->
      <div class="salon-header">
        <h1 id="salonName">Loading...</h1>
        <div class="rating-badge">
          <div class="stars" id="stars"></div>
          <span class="review-count" id="reviewCount">(0 reviews)</span>
        </div>
        <div class="offer-banner">
          <i class="fas fa-gift"></i>
          <div class="offer-text">
            <strong>Welcome Offer!</strong> Get 20% off on your first visit
          </div>
          <span class="offer-code">WELCOME20</span>
        </div>
      </div>

      <!-- Info Grid -->
      <div class="info-grid">
        <!-- Location Card -->
        <div class="info-card">
          <div class="info-card-header">
            <i class="fas fa-map-marker-alt"></i>
            <h3>Location</h3>
          </div>
          <div class="info-content">
            <p><i class="fas fa-location-dot"></i> <span id="fullLocation"></span></p>
            <p><i class="fas fa-city"></i> <span id="city"></span>, <span id="state"></span> - <span id="pincode"></span></p>
          </div>
        </div>

        <!-- Contact Card -->
        <div class="info-card">
          <div class="info-card-header">
            <i class="fas fa-phone-alt"></i>
            <h3>Contact</h3>
          </div>
          <div class="info-content">
            <p><i class="fas fa-phone"></i> <span id="phone"></span></p>
            <p><i class="fas fa-envelope"></i> <span id="email"></span></p>
            <p><i class="fab fa-instagram"></i> <a id="instagram" href="#" target="_blank" style="color: var(--gold-primary);">@salonhandle</a></p>
          </div>
        </div>

        <!-- Hours Card -->
        <div class="info-card">
          <div class="info-card-header">
            <i class="fas fa-clock"></i>
            <h3>Business Hours</h3>
          </div>
          <div class="info-content">
            <p><i class="fas fa-calendar-day"></i> <span id="hours"></span></p>
          </div>
        </div>

        <!-- Services Card -->
        <div class="info-card">
          <div class="info-card-header">
            <i class="fas fa-concierge-bell"></i>
            <h3>Services</h3>
          </div>
          <div class="info-content">
            <ul class="services-list" id="servicesFull"></ul>
          </div>
        </div>
      </div>

      <!-- Amenities Card -->
      <div class="info-card">
        <div class="info-card-header">
          <i class="fas fa-spa"></i>
          <h3>Amenities & Facilities</h3>
        </div>
        <div class="amenities-grid" id="amenitiesList"></div>
      </div>

      <!-- Staff Selection Card -->
      <div class="info-card">
        <div class="info-card-header">
          <i class="fas fa-users"></i>
          <h3>Choose Your Stylist</h3>
        </div>
        <div class="staff-grid" id="staffs"></div>
      </div>

      <!-- Book Button -->
      <div class="book-btn-container">
        <button class="btn-book" id="bookBtn">
          <i class="fas fa-calendar-check"></i> Book Appointment
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal" id="photoModal">
  <div class="modal-content">
    <div class="modal-close" id="closeModal">&times;</div>
    <div class="modal-nav modal-prev" id="prevBtn">&#8249;</div>
    <img id="modalImg" src="" alt="Salon Photo">
    <div class="modal-nav modal-next" id="nextBtn">&#8250;</div>
  </div>
</div>

<!-- Toast -->
<div class="toast-message" id="toastMsg">
  <i class="fas fa-check-circle"></i> Booking Confirmed!
</div>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
  AOS.init({ duration: 600, once: true });
  
  // BACKEND API - COMPLETELY PRESERVED
  document.addEventListener('DOMContentLoaded', function() {
    const urlParams = new URLSearchParams(window.location.search);
    const salonId = urlParams.get('id') || 1;

    fetch(`https://salon-booking-backend-vsaz.onrender.com/api/salon-details/${salonId}`)
      .then(res => {
        if (!res.ok) throw new Error('Salon not found');
        return res.json();
      })
      .then(data => {
        if (!data.success) throw new Error(data.message || 'Failed to load salon details');

        const salon = data.data;
        
        // Basic Info - ALL PRESERVED
        document.getElementById("salonName").textContent = salon.salonName || "Unnamed Salon";
        document.getElementById("fullLocation").textContent = salon.fullLocation || "Not specified";
        document.getElementById("city").textContent = salon.city || "Not specified";
        document.getElementById("state").textContent = salon.state || "Not specified";
        document.getElementById("pincode").textContent = salon.pincode || "Not specified";
        document.getElementById("phone").textContent = salon.phone || "Not available";
        document.getElementById("email").textContent = salon.email || "Not available";
        document.getElementById("hours").textContent = formatHours(salon.hours) || "Not available";
        
        // Rating
        const rating = salon.rating || 4.5;
        const reviewCount = salon.reviewCount || 128;
        document.getElementById("reviewCount").textContent = `(${reviewCount} reviews)`;
        updateStars(rating);
        
        // Instagram
        const instagramLink = document.getElementById("instagram");
        if (salon.instagram && salon.instagram.startsWith('http')) {
          instagramLink.href = salon.instagram;
          instagramLink.textContent = "View Profile";
        } else {
          instagramLink.style.display = "none";
        }

        // Services
        const servicesFull = document.getElementById("servicesFull");
        if (salon.services) {
          servicesFull.innerHTML = salon.services.split(',')
            .map(service => {
              const [name, price] = service.split(':');
              return `<li class="service-item"><span class="service-name">${name.trim()}</span><span class="service-price">₹${price || '0'}</span></li>`;
            }).join('');
        } else {
          servicesFull.innerHTML = "<li class='service-item'>No services listed</li>";
        }

        // Amenities
        const amenitiesList = document.getElementById("amenitiesList");
        if (salon.amenities) {
          amenitiesList.innerHTML = salon.amenities.split(',')
            .map(a => `<div class="amenity-tag"><i class="fas fa-check-circle"></i><span>${a.trim()}</span></div>`).join('');
        } else {
          amenitiesList.innerHTML = "<div class='amenity-tag'>No amenities listed</div>";
        }

        // Staff
        const staffDiv = document.getElementById("staffs");
        if (salon.staffs) {
          staffDiv.innerHTML = salon.staffs.split(',')
            .map(staff => `
              <div class="staff-card" data-staff="${staff.trim()}">
                <div class="staff-avatar"><i class="fas fa-user-circle"></i></div>
                <div class="staff-name">${staff.trim()}</div>
                <input type="radio" name="staffs" value="${staff.trim()}" style="display:none">
              </div>
            `).join('');
          
          // Staff selection
          document.querySelectorAll('.staff-card').forEach(card => {
            card.addEventListener('click', function() {
              document.querySelectorAll('.staff-card').forEach(c => c.classList.remove('selected'));
              this.classList.add('selected');
              this.querySelector('input').checked = true;
            });
          });
        } else {
          staffDiv.innerHTML = "<div class='staff-card'>No staff listed</div>";
        }

        // Photos
        const mainPhoto = document.getElementById("mainPhoto");
        const thumbnails = document.getElementById("thumbnailList");
        const imageNavDots = document.getElementById("imageNavDots");
        let currentIndex = 0;
        let photoArray = [];

        if (salon.photos) {
          photoArray = typeof salon.photos === 'string' ? salon.photos.split(',') : salon.photos;
          photoArray = photoArray.filter(photo => photo.trim() !== '');
          document.getElementById("photoCount").textContent = `${photoArray.length} photos`;

          if (photoArray.length > 0) {
            updateMainImage();

            // Thumbnails
            photoArray.forEach((photo, i) => {
              const img = document.createElement("img");
              img.src = `https://salon-booking-backend-vsaz.onrender.com/uploads/${photo.trim()}`;
              img.alt = `Photo ${i + 1}`;
              if (i === 0) img.classList.add("active");
              img.addEventListener("click", () => {
                currentIndex = i;
                updateMainImage();
                updateActiveStates();
              });
              thumbnails.appendChild(img);
            });

            // Dots
            photoArray.forEach((_, i) => {
              const dot = document.createElement("div");
              dot.classList.add("dot");
              if (i === 0) dot.classList.add("active");
              dot.addEventListener("click", () => {
                currentIndex = i;
                updateMainImage();
                updateActiveStates();
              });
              imageNavDots.appendChild(dot);
            });
          } else {
            mainPhoto.src = "https://via.placeholder.com/600x400?text=No+Photos";
          }
        }

        function updateMainImage() {
          if (photoArray.length > 0) {
            mainPhoto.src = `https://salon-booking-backend-vsaz.onrender.com/uploads/${photoArray[currentIndex].trim()}`;
          }
        }

        function updateActiveStates() {
          thumbnails.querySelectorAll("img").forEach((img, i) => {
            img.classList.toggle("active", i === currentIndex);
          });
          imageNavDots.querySelectorAll(".dot").forEach((dot, i) => {
            dot.classList.toggle("active", i === currentIndex);
          });
        }

        // Modal
        const modal = document.getElementById("photoModal");
        const modalImg = document.getElementById("modalImg");
        
        mainPhoto.onclick = () => {
          modal.classList.add("active");
          modalImg.src = mainPhoto.src;
        };
        
        document.getElementById("closeModal").onclick = () => modal.classList.remove("active");
        document.getElementById("prevBtn").onclick = () => {
          currentIndex = (currentIndex - 1 + photoArray.length) % photoArray.length;
          modalImg.src = `https://salon-booking-backend-vsaz.onrender.com/uploads/${photoArray[currentIndex].trim()}`;
          updateActiveStates();
        };
        document.getElementById("nextBtn").onclick = () => {
          currentIndex = (currentIndex + 1) % photoArray.length;
          modalImg.src = `https://salon-booking-backend-vsaz.onrender.com/uploads/${photoArray[currentIndex].trim()}`;
          updateActiveStates();
        };
        
        modal.onclick = (e) => { if (e.target === modal) modal.classList.remove("active"); };
        
        // Keyboard nav
        document.addEventListener('keydown', (e) => {
          if (modal.classList.contains("active")) {
            if (e.key === "Escape") modal.classList.remove("active");
            if (e.key === "ArrowLeft") document.getElementById("prevBtn").click();
            if (e.key === "ArrowRight") document.getElementById("nextBtn").click();
          }
        });

        // Booking button - BACKEND PRESERVED
        document.getElementById("bookBtn").addEventListener("click", (e) => {
          e.preventDefault();
          const selectedStaff = document.querySelector('input[name="staffs"]:checked');
          if (!selectedStaff) {
            showToast("Please select a staff member", "error");
            return;
          }
          const salonName = document.getElementById("salonName").textContent;
          window.location.href = `book.html?salonId=${salonId}&staff=${encodeURIComponent(selectedStaff.value)}&salonName=${encodeURIComponent(salonName)}`;
        });

        function formatHours(hoursString) {
          if (!hoursString) return null;
          return hoursString.replace(/\?/g, '-');
        }
        
        function updateStars(rating) {
          const starsContainer = document.getElementById("stars");
          const fullStars = Math.floor(rating);
          const hasHalfStar = rating % 1 >= 0.5;
          starsContainer.innerHTML = '';
          for (let i = 0; i < fullStars; i++) starsContainer.innerHTML += '<i class="fas fa-star"></i>';
          if (hasHalfStar) starsContainer.innerHTML += '<i class="fas fa-star-half-alt"></i>';
          for (let i = 0; i < 5 - Math.ceil(rating); i++) starsContainer.innerHTML += '<i class="far fa-star"></i>';
        }
      })
      .catch(err => {
        console.error("Error:", err);
        document.querySelector(".salon-details-wrapper").innerHTML = `
          <div style="text-align: center; padding: 50px;">
            <h2 style="color: var(--gold-primary);">Error Loading Salon</h2>
            <p>${err.message}</p>
            <a href="index.html" style="color: var(--gold-primary);">Return Home</a>
          </div>
        `;
      });

    function showToast(msg, type = "success") {
      const toast = document.getElementById("toastMsg");
      toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${msg}`;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 3000);
    }
    
    // Share button
    document.getElementById("shareBtn")?.addEventListener("click", () => {
      if (navigator.share) {
        navigator.share({ title: document.getElementById("salonName").textContent, url: window.location.href });
      } else {
        showToast("Share feature not supported", "error");
      }
    });
    
    // Save button
    document.getElementById("saveBtn")?.addEventListener("click", function() {
      const icon = this.querySelector("i");
      if (icon.classList.contains("far")) {
        icon.classList.remove("far");
        icon.classList.add("fas");
        showToast("Saved to favorites!");
      } else {
        icon.classList.remove("fas");
        icon.classList.add("far");
        showToast("Removed from favorites");
      }
    });
  });
</script>
</body>
</html>
