<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Salons | GlowBook - Premium Beauty Booking</title>
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --primary-blue: #0066FF;
      --primary-light: #4D94FF;
      --primary-dark: #0044CC;
      --primary-gradient: linear-gradient(135deg, #0066FF, #0044CC);
      --secondary-blue: #E8F0FE;
      --bg-light: #F8FAFF;
      --white: #FFFFFF;
      --dark: #1A2332;
      --gray: #6B7A8F;
      --light-gray: #E8EDF2;
      --shadow-sm: 0 2px 10px rgba(0, 102, 255, 0.08);
      --shadow-md: 0 8px 30px rgba(0, 102, 255, 0.12);
      --shadow-lg: 0 20px 60px rgba(0, 102, 255, 0.15);
      --transition-smooth: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      --radius-sm: 12px;
      --radius-md: 20px;
      --radius-lg: 30px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-light);
      color: var(--dark);
      min-height: 100vh;
      padding: 20px;
      position: relative;
    }

    /* Subtle Background Pattern */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(circle at 20% 50%, rgba(0, 102, 255, 0.03) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(0, 102, 255, 0.02) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    /* ============ GLOWBOOK LOGO - BLUE THEME ============ */
    .glowbook-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      cursor: pointer;
      transition: var(--transition-smooth);
    }
    .glowbook-logo:hover {
      transform: scale(1.02);
    }
    .logo-icon {
      position: relative;
      width: 45px;
      height: 45px;
      background: var(--primary-gradient);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0, 102, 255, 0.3);
    }
    .logo-icon::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 70%);
    }
    .logo-icon i {
      font-size: 24px;
      color: white;
      position: relative;
      z-index: 1;
    }
    .logo-icon .sparkle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: white;
      border-radius: 50%;
      top: 8px;
      right: 8px;
      animation: sparkle 1.5s infinite;
    }
    @keyframes sparkle {
      0%, 100% { opacity: 0; transform: scale(0.5); }
      50% { opacity: 1; transform: scale(1); }
    }
    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.1;
    }
    .logo-text .glow {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: var(--primary-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-family: 'Playfair Display', serif;
    }
    .logo-text .book {
      font-size: 0.7rem;
      letter-spacing: 2px;
      color: var(--gray);
      margin-top: 2px;
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 2rem;
      padding: 20px 0;
      background: var(--white);
      border-radius: var(--radius-md);
      padding: 20px 30px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--light-gray);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .header h1 {
      font-size: 1.6rem;
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      color: var(--dark);
      margin: 0;
    }

    .header h1 span {
      color: var(--primary-blue);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 15px;
      flex: 1;
      justify-content: flex-end;
    }

    #search-bar {
      flex: 1;
      min-width: 200px;
      max-width: 350px;
      padding: 12px 20px;
      background: var(--bg-light);
      border: 2px solid var(--light-gray);
      border-radius: 50px;
      color: var(--dark);
      font-size: 0.9rem;
      transition: var(--transition-smooth);
    }

    #search-bar:focus {
      outline: none;
      border-color: var(--primary-blue);
      box-shadow: 0 0 0 4px rgba(0, 102, 255, 0.1);
    }

    #search-bar::placeholder {
      color: var(--gray);
    }

    .filter-toggle {
      display: none;
      background: var(--primary-gradient);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 50px;
      font-weight: 600;
      cursor: pointer;
      align-items: center;
      gap: 8px;
      transition: var(--transition-smooth);
      box-shadow: var(--shadow-sm);
      white-space: nowrap;
    }

    .filter-toggle:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    /* Content Wrapper */
    .content-wrapper {
      display: flex;
      gap: 2rem;
    }

    /* Filters Sidebar - White & Blue */
    #filters {
      width: 300px;
      background: var(--white);
      padding: 1.5rem;
      border-radius: var(--radius-md);
      border: 1px solid var(--light-gray);
      height: fit-content;
      position: sticky;
      top: 20px;
      transition: var(--transition-smooth);
      box-shadow: var(--shadow-sm);
    }

    #filters:hover {
      box-shadow: var(--shadow-md);
    }

    #filters h2 {
      font-size: 1.3rem;
      margin-bottom: 1.2rem;
      color: var(--dark);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: 'Playfair Display', serif;
    }

    .filter-section {
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--light-gray);
    }

    .filter-section:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .filter-section strong {
      font-size: 0.85rem;
      display: block;
      color: var(--primary-blue);
      margin-bottom: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 700;
    }

    .filter-section label {
      display: flex;
      align-items: center;
      margin: 8px 0;
      font-size: 0.9rem;
      cursor: pointer;
      padding: 6px 0;
      border-radius: 8px;
      transition: var(--transition-smooth);
      color: var(--gray);
    }

    .filter-section label:hover {
      color: var(--primary-blue);
      background: var(--secondary-blue);
      padding-left: 8px;
    }

    .filter-section input[type="checkbox"] {
      margin-right: 0.8rem;
      width: 18px;
      height: 18px;
      accent-color: var(--primary-blue);
      cursor: pointer;
    }

    .clear-filters {
      background: none;
      border: none;
      color: var(--primary-blue);
      cursor: pointer;
      font-size: 0.8rem;
      padding: 4px 8px;
      border-radius: 6px;
      transition: var(--transition-smooth);
      font-weight: 600;
    }

    .clear-filters:hover {
      background: var(--secondary-blue);
    }

    /* Active Filters Tags - Blue Theme */
    .filter-tags {
      margin-bottom: 1.5rem;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .filter-tags span {
      padding: 6px 14px;
      border-radius: 50px;
      background: var(--secondary-blue);
      color: var(--primary-blue);
      cursor: pointer;
      font-size: 0.8rem;
      transition: var(--transition-smooth);
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(0, 102, 255, 0.15);
      font-weight: 500;
    }

    .filter-tags span:hover {
      background: rgba(0, 102, 255, 0.15);
      transform: translateY(-2px);
    }

    /* Main Content */
    main {
      background: var(--white);
      padding: 1.5rem;
      border-radius: var(--radius-md);
      border: 1px solid var(--light-gray);
      flex-grow: 1;
      box-shadow: var(--shadow-sm);
    }

    /* Salon Grid - Clean Cards */
    .salon-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
      list-style: none;
    }

    .salon-list li {
      background: var(--bg-light);
      border-radius: var(--radius-md);
      overflow: hidden;
      transition: var(--transition-smooth);
      position: relative;
      border: 1px solid var(--light-gray);
    }

    .salon-list li:hover {
      transform: translateY(-8px);
      border-color: var(--primary-blue);
      box-shadow: var(--shadow-lg);
    }

    .salon-image {
      width: 100%;
      height: 200px;
      object-fit: cover;
      transition: var(--transition-smooth);
      background: var(--light-gray);
    }

    .salon-list li:hover .salon-image {
      transform: scale(1.02);
    }

    .salon-badge {
      position: absolute;
      top: 15px;
      right: 15px;
      background: var(--primary-gradient);
      color: white;
      padding: 6px 14px;
      border-radius: 50px;
      font-size: 0.75rem;
      font-weight: 700;
      z-index: 1;
      box-shadow: var(--shadow-sm);
    }

    .details {
      padding: 1.2rem;
    }

    .details strong {
      font-size: 1.2rem;
      color: var(--dark);
      display: block;
      margin-bottom: 0.5rem;
      font-family: 'Playfair Display', serif;
    }

    .details p {
      font-size: 0.85rem;
      color: var(--gray);
      margin: 6px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .details p i {
      width: 18px;
      color: var(--primary-blue);
    }

    .rating {
      display: flex;
      align-items: center;
      gap: 4px;
      color: #F59E0B;
    }

    .btn {
      display: block;
      padding: 10px;
      margin: 12px 1.2rem 1.2rem;
      background: var(--primary-gradient);
      color: white;
      text-decoration: none;
      font-weight: 600;
      border-radius: 50px;
      text-align: center;
      transition: var(--transition-smooth);
      font-size: 0.9rem;
      box-shadow: var(--shadow-sm);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    /* No Results */
    .no-results {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3rem;
      color: var(--gray);
    }

    .no-results i {
      font-size: 4rem;
      color: var(--primary-blue);
      margin-bottom: 1rem;
      opacity: 0.3;
    }

    /* Loading Animation */
    .loading-spinner {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3rem;
    }

    .loading-spinner .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--light-gray);
      border-top-color: var(--primary-blue);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Animations */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .salon-list li {
      animation: fadeIn 0.5s ease-out;
    }

    /* Responsive */
    @media (max-width: 1024px) {
      .salon-list {
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      }
    }

    @media (max-width: 900px) {
      .content-wrapper {
        flex-direction: column;
      }
      
      #filters {
        width: 100%;
        position: static;
        display: none;
      }
      
      #filters.active {
        display: block;
      }
      
      .filter-toggle {
        display: flex;
      }
      
      .header {
        flex-direction: column;
        align-items: stretch;
        padding: 15px 20px;
      }
      
      .header-left {
        justify-content: space-between;
      }
      
      .header-right {
        flex-wrap: wrap;
      }
      
      #search-bar {
        max-width: 100%;
        flex: 1;
      }
    }

    @media (max-width: 600px) {
      body {
        padding: 15px;
      }
      
      .salon-list {
        grid-template-columns: 1fr;
      }
      
      .details strong {
        font-size: 1rem;
      }
      
      .logo-text .glow {
        font-size: 1.2rem;
      }
      
      .logo-icon {
        width: 38px;
        height: 38px;
      }
      
      .logo-icon i {
        font-size: 18px;
      }
      
      .header h1 {
        font-size: 1.2rem;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <!-- Header with GlowBook Logo -->
  <div class="header">
    <div class="header-left">
      <!-- GlowBook Logo - Clickable to Home -->
      <a href="index.html" class="glowbook-logo">
        <div class="logo-icon">
          <i class="fas fa-spa"></i>
          <div class="sparkle"></div>
        </div>
        <div class="logo-text">
          <span class="glow">GlowBook</span>
          <span class="book">BOOK YOUR GLOW</span>
        </div>
      </a>
      <h1>Salons in <span id="city-name"></span></h1>
    </div>
    <div class="header-right">
      <input type="text" id="search-bar" placeholder="🔍 Search salons by name..." />
      <button class="filter-toggle" id="filter-toggle">
        <i class="fas fa-filter"></i> Filters
      </button>
    </div>
  </div>

  <div class="content-wrapper">
    <section id="filters">
      <h2>
        Filters 
        <button class="clear-filters" id="clear-filters">Clear all</button>
      </h2>
      <div class="filter-section">
        <strong>💰 Price Range (₹)</strong>
        <label><input type="checkbox" name="price" value="100" /> Up to ₹100</label>
        <label><input type="checkbox" name="price" value="300" /> ₹200 - ₹300</label>
        <label><input type="checkbox" name="price" value="500" /> ₹400 - ₹500</label>
      </div>
      <div class="filter-section">
        <strong>🥂 Welcome Drink</strong>
        <label><input type="checkbox" name="welcomeDrink" value="yes" /> Available</label>
        <label><input type="checkbox" name="welcomeDrink" value="no" /> Not Available</label>
      </div>
      <div class="filter-section">
        <strong>✨ Extra Services</strong>
        <label><input type="checkbox" name="extra" value="spa" /> Spa</label>
        <label><input type="checkbox" name="extra" value="massage" /> Massage</label>
        <label><input type="checkbox" name="extra" value="facial" /> Facial</label>
      </div>
    </section>

    <main>
      <div class="filter-tags" id="active-filters"></div>
      <ul class="salon-list" id="salon-list">
        <li class="loading-spinner">
          <div class="spinner"></div>
          <p>Loading premium salons...</p>
        </li>
      </ul>
      <div id="salon-details" style="display:none;"></div>
    </main>
  </div>
</div>

<script>
  // BACKEND API - COMPLETELY PRESERVED
  function getQueryParam(param) {
    const urlParams = new URLSearchParams(window.location.search);
    return urlParams.get(param);
  }

  const city = getQueryParam('city');
  document.getElementById('city-name').textContent = city || 'Unknown';

  const filtersSection = document.getElementById('filters');
  const filterToggle = document.getElementById('filter-toggle');
  const detailsEl = document.getElementById('salon-details');
  const clearFiltersBtn = document.getElementById('clear-filters');
  const salonListEl = document.getElementById('salon-list');
  const searchBar = document.getElementById('search-bar');
  const activeFiltersEl = document.getElementById('active-filters');

  let salons = [];
  let activeFilters = {
    price: [],
    welcomeDrink: [],
    extra: []
  };

  function renderSalons(filteredSalons) {
    if (filteredSalons.length === 0) {
      salonListEl.innerHTML = `
        <div class="no-results">
          <i class="fas fa-spa"></i>
          <h3>No salons found</h3>
          <p>Try adjusting your filters or search term</p>
        </div>
      `;
      detailsEl.style.display = 'none';
      return;
    }
    
    salonListEl.innerHTML = ''; 
    filteredSalons.forEach((salon) => {
      const li = document.createElement('li');
      
      const badge = salon.discount ? `<span class="salon-badge">${salon.discount}% OFF</span>` : '';
      
      li.innerHTML = `
        ${badge}
        <img
          src="https://salon-booking-backend-vsaz.onrender.com/uploads/${salon.photoURL}"
          alt="${salon.salonName}"
          class="salon-image"
          onerror="this.src='https://via.placeholder.com/300x200/0066FF/FFFFFF?text=Salon'">
        <div class="details">
          <strong>${salon.salonName}</strong>
          <p><i class="fas fa-map-marker-alt"></i> ${salon.location}</p>
          <p><i class="fas fa-tag"></i> ₹${salon.priceRange}</p>
          <p class="rating"><i class="fas fa-star"></i> ${salon.rating} / 5</p>
          <p><i class="fas fa-info-circle"></i> ${salon.description ? salon.description.substring(0, 80) : 'Premium salon services'}...</p>
        </div>
        <a href="salon-details.html?id=${salon.id}" class="btn">View Details →</a>
      `;
      salonListEl.appendChild(li);
    });
  }

  function updateActiveFiltersDisplay() {
    activeFiltersEl.innerHTML = '';
    
    let hasActiveFilters = false;
    
    activeFilters.price.forEach(value => {
      hasActiveFilters = true;
      const span = document.createElement('span');
      span.innerHTML = `💰 Up to ₹${value} <i class="fas fa-times"></i>`;
      span.dataset.type = 'price';
      span.dataset.value = value;
      activeFiltersEl.appendChild(span);
    });
    
    activeFilters.welcomeDrink.forEach(value => {
      hasActiveFilters = true;
      const span = document.createElement('span');
      const displayText = value === 'yes' ? 'Available' : 'Not Available';
      span.innerHTML = `🥂 Welcome Drink: ${displayText} <i class="fas fa-times"></i>`;
      span.dataset.type = 'welcomeDrink';
      span.dataset.value = value;
      activeFiltersEl.appendChild(span);
    });
    
    activeFilters.extra.forEach(value => {
      hasActiveFilters = true;
      const span = document.createElement('span');
      span.innerHTML = `✨ ${value.charAt(0).toUpperCase() + value.slice(1)} <i class="fas fa-times"></i>`;
      span.dataset.type = 'extra';
      span.dataset.value = value;
      activeFiltersEl.appendChild(span);
    });
    
    activeFiltersEl.style.display = hasActiveFilters ? 'flex' : 'none';
    
    activeFiltersEl.querySelectorAll('span').forEach(span => {
      span.addEventListener('click', () => {
        const { type, value } = span.dataset;
        const checkbox = filtersSection.querySelector(`input[name="${type}"][value="${value}"]`);
        if (checkbox) {
          checkbox.checked = false;
          applyFilters();
        }
      });
    });
  }

  function applyFilters() {
    activeFilters = {
      price: [...filtersSection.querySelectorAll('input[name="price"]:checked')].map(input => Number(input.value)),
      welcomeDrink: [...filtersSection.querySelectorAll('input[name="welcomeDrink"]:checked')].map(input => input.value),
      extra: [...filtersSection.querySelectorAll('input[name="extra"]:checked')].map(input => input.value)
    };
    
    updateActiveFiltersDisplay();
    
    let filtered = [...salons];
    
    const query = searchBar.value.toLowerCase();
    if (query) {
      filtered = filtered.filter(salon => salon.salonName.toLowerCase().includes(query));
    }
    
    if (activeFilters.price.length > 0) {
      filtered = filtered.filter(salon =>
        activeFilters.price.some(priceLimit => salon.priceRange <= priceLimit)
      );
    }
    
    if (activeFilters.welcomeDrink.length > 0) {
      filtered = filtered.filter(salon =>
        salon.welcomeDrink && activeFilters.welcomeDrink.includes(salon.welcomeDrink.toLowerCase())
      );
    }
    
    if (activeFilters.extra.length > 0) {
      filtered = filtered.filter(salon =>
        salon.extras && activeFilters.extra.every(extra => salon.extras.includes(extra))
      );
    }
    
    renderSalons(filtered);
    if (detailsEl) detailsEl.style.display = 'none';
  }

  // BACKEND API - COMPLETELY PRESERVED
  function fetchSalons() {
    if (!city) {
      salonListEl.innerHTML = '<li class="no-results"><i class="fas fa-city"></i><h3>Please select a city</h3></li>';
      return;
    }
    
    salonListEl.innerHTML = `
      <li class="loading-spinner">
        <div class="spinner"></div>
        <p>Loading premium salons...</p>
      </li>
    `;
    
    fetch(`https://salon-booking-backend-vsaz.onrender.com/salons/city/${encodeURIComponent(city)}`)
      .then(res => {
        if (!res.ok) throw new Error('Failed to fetch salons');
        return res.json();
      })
      .then(data => {
        salons = data;
        applyFilters();
      })
      .catch(() => {
        salonListEl.innerHTML = '<li class="no-results"><i class="fas fa-exclamation-circle"></i><h3>Error loading salons</h3><p>Please try again later</p></li>';
      });
  }

  // Event Listeners - ALL PRESERVED
  if (searchBar) searchBar.addEventListener('input', applyFilters);
  if (filtersSection) {
    filtersSection.querySelectorAll('input').forEach(input => {
      input.addEventListener('change', applyFilters);
    });
  }
  
  if (filterToggle) {
    filterToggle.addEventListener('click', () => {
      filtersSection.classList.toggle('active');
    });
  }
  
  if (clearFiltersBtn) {
    clearFiltersBtn.addEventListener('click', () => {
      filtersSection.querySelectorAll('input').forEach(input => {
        input.checked = false;
      });
      if (searchBar) searchBar.value = '';
      applyFilters();
    });
  }
  
  // Close filters when clicking outside on mobile
  document.addEventListener('click', (e) => {
    if (window.innerWidth <= 900 && 
        filtersSection && filtersSection.classList.contains('active') &&
        !filtersSection.contains(e.target) &&
        e.target !== filterToggle) {
      filtersSection.classList.remove('active');
    }
  });

  fetchSalons();
</script>
</body>
</html>
